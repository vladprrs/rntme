        message: "identity-auth0 needs explicit image config; requestContext.default policy is missing; auth middleware cannot find the identity-auth0 workload."
        classification: "implementation_bug"
        rationale: "`apps/cli/src/deploy-engine/load-target.ts` validates workflow/auth fields but normalizes `modules` and `policyValues` to empty objects."
  - id: T007
    type: worker
