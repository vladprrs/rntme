version: 2

goal:
  title: "CV Extract Platform Client Auth0 Bootstrap E2E"
  slug: "cv-extract-platform-client-auth0-bootstrap-e2e"
  kind: recovery
  tranche: "continuous execution: bootstrap an approved test Auth0 platform credential, then complete platform-client publish/deploy/smoke/dashboard proof"
  status: done
  outcome_clarification_2026_05_14: |
    Operator vladprsib reviewed the live platform and clarified that the goal's
    real outcome includes a usable platform UI, not only API/PAT dashboard
    proof. On login the UI shows "Your account isn't linked to an organization
    yet" (/no-org). Root cause: the platform `organizations` service has no
    `Organization` row for the Auth0 org `org_uZUWhpWgK54VWC2X`, and
    `createOrganization` mints fresh UUIDs decoupled from Auth0 org ids while
    projects/tokens/deployments are all scoped by the Auth0 org id. Operator
    chose the proper architectural fix (reconcile the organizations service
    with Auth0 org ids) and to commit the T003 deploy fixes on a branch. The
    prior T999 audit (full_outcome_complete: true) was scoped to the original
    charter's API-transcript proof and is superseded by this clarification.
  intake:
    original_request: "Create a fresh GoalBuddy goal with enough current context to continue the cv-extract platform-client deploy without manual Auth0/browser input."
    interpreted_outcome: "The live cv-extract demo is published and deployed through platform-client mode, smoke-tested, and visible through the platform dashboard data path for org_uZUWhpWgK54VWC2X."
    input_shape: recovery
    audience: "platform operator/user vladprsib, repo maintainers, and live cv-extract demo users"
    authority: approved
    proof_type: demo
    completion_proof: "Platform-client publish/deploy succeeds on the live platform; deployment id, target slug, project version sequence, app base URL, marketing URL when present, dashboard 200 proof, and resume smoke result are recorded."
    likely_misfire: "Stopping at the already-passing direct-mode cv-extract deploy or at Auth0 grant/PAT bootstrap without proving platform-client publish/deploy and dashboard access."
    blind_spots_considered:
      - "The old board contains stale exploratory context; use it only as historical evidence."
      - "Auth0 grant creation is approved only because the Auth0 tenant is test-only."
      - "Persistent test automation grant must not be represented as the product auth contract."
      - "Secret material must not be printed, committed, or left in logs."
      - "Platform-client proof requires a platform project version sequence and deployment id; direct mode cannot provide them."
    existing_plan_facts:
      - "Old goal: docs/goals/cv-extract-platform-client-deploy-e2e/."
      - "Main plan: docs/superpowers/plans/2026-05-13-cv-extract-platform-client-deploy-e2e.md."
      - "Auth follow-up plan: docs/superpowers/plans/2026-05-13-platform-multi-provider-edge-auth.md."
      - "Platform blueprint uses ordered auth providers: platform-tokens first, identity-auth0 second."
      - "Direct-mode deploy at https://cv-extract.rntme.com passed a fresh 2026-05-14 resume smoke, but it is not platform-client proof."
      - "Latest known live blocker: no PLATFORM_BROWSER_JWT, current shell PAT got 401, Auth0 client_credentials for https://platform.rntme.com/api got 403 because no client grant existed."
      - "Operator approved persistent Auth0 test automation grant for the test-only tenant."

