      - "bun run --filter @rntme/cli typecheck"
      - "bun run --filter @rntme/cli build"
      - "set -a; . ./.env; set +a; bun apps/cli/dist/bin/cli.js platform up --target platform.target.json --log-file <goal-notes-log>"
    stop_if:
      - "Provisioner entry bundling requires changing module package build contracts."
      - "Auth0 provisioning fails due remote credentials or tenant policy rather than local resolution."
      - "Any output would require recording secret values."
    receipt:
      result: done_then_next_blocker
      summary: |
        Implemented bundled provisioner entry support for the platform
        blueprint copied into CLI dist. The CLI build now writes
        `.provisioners/manifest.json` and the Auth0 provisioner entry, and
