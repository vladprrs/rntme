        - "Live operator proof (T006) unproven."
      next_allowed_task: T005
      blocked_tasks: []

  - id: T005
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: >-
      Extend the listProjectServices native handler family with a
