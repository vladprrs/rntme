name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_live_cv_extract_smoke:
        description: 'Run the gated cv-extract live deploy smoke (requires live secrets in env)'
        required: false
        default: 'false'
jobs:
  build-typecheck-test-lint:
    runs-on: ubuntu-latest
    env:
      TALLY_FORM_ID: ci-placeholder
      GITHUB_URL: https://github.com/vladprrs/rntme
      DOCS_URL: https://docs.rntme.com
      PLATFORM_URL: https://platform.rntme.com
      # Skip e2e suites that boot containers via testcontainers. Docker is
      # available on the runner, but the warmup blows the 5-min timeout.
      # Suites honour this flag via their local docker-available helpers.
      SKIP_TESTCONTAINERS: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run typecheck
      - run: bun run test
      - run: bun run lint
      - run: bun run depcruise
      - run: bun run vendor:check

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: test
            file: Dockerfile.test
            tag: rntme-test-bun:ci
          - name: landing
            file: apps/landing/Dockerfile
            tag: rntme-landing:ci
          - name: runtime
            file: packages/runtime/runtime/Dockerfile
            tag: rntme-runtime:ci
          - name: bpmn-worker
            file: packages/runtime/bpmn-worker/Dockerfile
            tag: rntme-bpmn-worker:ci
          - name: identity-auth0
            file: modules/identity/auth0/Dockerfile
            tag: rntme-identity-auth0:ci
          - name: storage-s3
            file: modules/storage/s3/Dockerfile
            tag: rntme-storage-s3:ci
          - name: marketing-site-static
            file: modules/marketing-site/static-html/Dockerfile
            tag: rntme-marketing-site-static:ci
          - name: ai-llm-openrouter
            file: modules/ai-llm/openrouter/Dockerfile
            tag: rntme-ai-llm-openrouter:ci
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          tags: ${{ matrix.tag }}
          push: false

  cv-extract-live-smoke:
    # Gated manual-dispatch job for the cv-extract live deploy smoke test.
    # Disabled on push/pull_request: only runs when the workflow is dispatched
    # manually AND the dispatcher opts in via `run_live_cv_extract_smoke=true`.
    # The test itself self-gates on RNTME_LIVE_DEPLOY and the other env vars,
    # so when secrets are absent it skips cleanly.
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_live_cv_extract_smoke == 'true' }}
    runs-on: ubuntu-latest
    env:
      # All values come from repository/environment secrets. They are NOT
      # hardcoded here. The test skips cleanly when any of them is unset.
      RNTME_LIVE_DEPLOY: ${{ secrets.RNTME_LIVE_DEPLOY }}
      RNTME_PLATFORM_URL: ${{ secrets.RNTME_PLATFORM_URL }}
      RNTME_PLATFORM_TOKEN: ${{ secrets.RNTME_PLATFORM_TOKEN }}
      RNTME_ORG: ${{ secrets.RNTME_ORG }}
      RNTME_PROJECT: ${{ secrets.RNTME_PROJECT }}
      RNTME_TARGET: ${{ secrets.RNTME_TARGET }}
      RNTME_CV_BASE_URL: ${{ secrets.RNTME_CV_BASE_URL }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      RNTME_OPENROUTER_IMAGE: ${{ secrets.RNTME_OPENROUTER_IMAGE }}
      RNTME_STORAGE_S3_IMAGE: ${{ secrets.RNTME_STORAGE_S3_IMAGE }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run --filter @rntme/demo-cv-extract-blueprint test:live
