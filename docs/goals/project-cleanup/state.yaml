# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Project Cleanup"
  slug: "project-cleanup"
  kind: open_ended
  tranche: "Complete broad repo cleanup through safe inventory, judged cleanup batches, verified deletes or docs moves, and a final CI-equivalent audit."
  status: done
  intake:
    original_request: "Prepare a goal to clean up the project, remove unnecessary files, delete Superpowers plans while keeping specs, and allow docs moves to improve structure."
    interpreted_outcome: "The repository has been cleaned of confirmed-unnecessary files, Superpowers plans are removed while specs remain, docs are reorganized where useful, and verification proves the cleanup did not break the project."
    input_shape: vague
    audience: repository maintainers and future coding agents
    authority: requested
    proof_type: test
    completion_proof: "A cleanup inventory exists, only confirmed unnecessary files were deleted or moved, specs were preserved, docs references were updated, and build/typecheck/test/lint/depcruise/vendor checks pass or exact blockers are recorded."
    likely_misfire: "A large cleanup diff deletes historical rationale, active docs, fixtures, package metadata, vendor metadata, or user work because it looked stale without evidence."
    blind_spots_considered:
      - "Destructive deletions need evidence and reversibility."
      - "Docs moves can break README stubs, owner-doc links, and references."
      - "Specs are rationale and must be preserved even when not current-state truth."
      - "Generated or fixture files may be intentionally committed."
      - "Dirty worktree changes must not be reverted or overwritten."
    existing_plan_facts:
      - "No visual board."
      - "Create a fresh goal."
      - "Perform broad repo cleanup."
      - "Delete Superpowers plan files."
      - "Preserve specs."
      - "Within docs, moving files is allowed when it improves structure."
      - "Protect history/docs and generated-sensitive surfaces unless Judge explicitly permits a change."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: false
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  # installed | bundled_not_installed | missing | unknown
  # Bundled templates were found with the GoalBuddy skill; installed agent configs were not found during prep.
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  # none | local | github_projects | both | unknown
  selected: none
  local:
    status: not_requested
    url: null
    command: "npx goalbuddy board docs/goals/project-cleanup"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: default
    objective: "Build a read-only cleanup inventory for unnecessary files, Superpowers plan files, docs move opportunities, and protected surfaces."
    inputs:
      - "AGENTS.md"
      - "docs/decision-system.md"
      - "local README stubs and linked docs/current owner docs as needed"
      - "docs/current/**"
      - "docs/history/**"
      - "package.json"
      - ".dependency-cruiser.cjs"
      - "git status and file references found by rg"
    constraints:
      - "Read-only."
      - "Do not delete, move, or edit files."
      - "Use rg for reference checks."
      - "Classify each candidate as delete, move, keep, or defer."
      - "Identify exact Superpowers plan files separately from specs."
      - "Preserve specs and protected surfaces unless later Judge explicitly approves a bounded touch."
    expected_output:
      - "Candidate inventory with exact paths and category: delete, move, keep, or defer."
      - "Exact list of Superpowers plan files proposed for deletion."
      - "Exact list of specs and protected surfaces that must remain untouched."
      - "Docs move opportunities with required reference updates."
      - "Recommended first cleanup batch and risk notes."
    receipt:
      result: done
      note: notes/T001-cleanup-inventory.md
      summary: "Built cleanup inventory: 19 Superpowers plan delete candidates, 10 Superpowers specs to preserve or move, generated/log delete candidates, protected surfaces, dirty worktree risks, and a recommended first docs cleanup batch."
      evidence:
        - "docs/goals/project-cleanup/notes/T001-cleanup-inventory.md"
        - "GoalBuddy update check: current version 0.3.6, no update available."
        - "GoalBuddy state check: ok, warnings only for bundled_not_installed agents."
        - "git status --short showed pre-existing platform/UI/vendor/goal edits plus untracked generated artifacts."

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Review the Scout inventory and choose the first largest safe cleanup batch."
    inputs:
      - "T001 receipt or note"
      - "Current git status"
      - "Goal constraints from goal.md and state.yaml"
    constraints:
      - "Do not implement."
      - "Approve only files with evidence that deletion or movement is safe."
      - "Do not approve spec deletion."
      - "Treat protected surfaces as requiring explicit rationale and stronger verification."
      - "If docs files move, require reference updates in the same Worker allowed_files."
    expected_output:
      - "Decision: approved | needs_more_scouting | blocked"
      - "Exact Worker objective for the first cleanup batch."
      - "allowed_files for the Worker."
      - "verify commands for the Worker."
      - "stop_if conditions."
      - "Deferred candidates and why they are not in the first batch."
    receipt:
      result: done
      decision: approved
      full_outcome_complete: false
      rationale: "The first largest safe batch is the explicit user requirement: delete tracked Superpowers plan files while preserving specs. Current docs have only five live references to those plan files, so the Worker can delete the plans and repair current-doc references without touching specs, historical plans, old GoalBuddy receipts, or unrelated dirty platform/UI files."
