name: runtime images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: GHCR image tag to publish
        required: true
        type: string
  push:
    tags:
      - runtime-*

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: image
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/runtime/runtime/Dockerfile
          push: true
          tags: |
            ghcr.io/vladprrs/rntme-runtime:${{ steps.image.outputs.tag }}
            ghcr.io/vladprrs/rntme-runtime:${{ github.sha }}

      - name: Build BPMN worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/runtime/bpmn-worker/Dockerfile
          push: true
          tags: |
            ghcr.io/vladprrs/rntme-bpmn-worker:${{ steps.image.outputs.tag }}
            ghcr.io/vladprrs/rntme-bpmn-worker:${{ github.sha }}
