name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-typecheck-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run build
      - run: pnpm -r run typecheck
      - run: pnpm -r run test
      - run: pnpm -r run lint
