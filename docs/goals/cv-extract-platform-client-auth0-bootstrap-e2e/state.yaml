  - id: T006
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Map the platform org/session/login flow precisely: how IntrospectSession works and what it returns, whether the Auth0 access token carries org_id, whether the SPA login flow passes the `organization` param, how listOrganizations/createOrganization are keyed, how the UI selects an org and lists projects, and how projects/tokens/deployments are scoped by org id."
    inputs:
      - "modules/identity/auth0/src/** (adapter, capabilities, mapping, types)"
      - "modules/identity/auth0/client/components/LoginScreen.tsx"
      - "apps/platform/blueprint/services/organizations/**"
      - "apps/platform/blueprint/services/projects/** and services/tokens/**"
      - "apps/platform/blueprint/services/app/ui/screens/** (no-org, org, project)"
      - "packages/platform/platform-core/src/use-cases/**"
      - "docs/current/owners/apps/platform.md and relevant package owner docs"
      - "docs/decision-system.md (org model conventions, if any)"
    constraints:
      - "Read-only except writing this task receipt."
      - "Do not mutate Auth0, the platform, or Dokploy."
      - "Do not print secret values."
    expected_output:
      - "Exact mechanism of IntrospectSession output shape and whether org_id is available from the Auth0 token."
      - "Whether the SPA login flow currently passes `organization` to Auth0."
      - "How listOrganizations / createOrganization are keyed and why no Organization row exists for org_uZUWhpWgK54VWC2X."
      - "Whether the platform Organization aggregate id can be set to an Auth0 org id, or createOrganization must change."
      - "Concrete file list and the smallest correct change set for the Judge to choose between auto-provision-on-login vs. createOrganization keyed by session org_id."
    receipt:
      result: done
      updated_at: "2026-05-14T09:10:00Z"
      summary: |
        Mapped the full org/session/login flow. The "isn't linked to an
        organization" state is a chain of gaps, not a single bug:

        1. The Session contract ALREADY supports org: proto
           `message Session` has `string organization_id = 4` and
           `repeated string roles = 6`
           (contracts-identity-v1/proto/identity.proto:129-146).
        2. But `introspectJwtToSession`
           (modules/identity/auth0/src/introspect-session.ts) never populates
           `organization_id`. Its `PUBLIC_CLAIMS` allowlist (lines 15-29) has
           no `org_id`/`org_name`, and the returned Session sets only
           session_id/user_id/status/token_type/expires_at/vendor_raw.claims.
        3. The Auth0 access token would not carry `org_id` anyway: the SPA
           login (modules/identity/auth0/client/index.ts `boot`, and
           client/components/LoginScreen.tsx) calls `client.loginWithRedirect()`
           with NO `organization` authorization param. Auth0 only injects
           `org_id` for organization-scoped logins.
        4. `listOrganizations` graph
           (apps/platform/blueprint/services/organizations/graphs/listOrganizations.json)
           calls IntrospectSession, then does an UNSCOPED `findMany` on
           `OrganizationView` (entity-mirror of the local `Organization`
           aggregate) filtered only by status=active. It is not membership-
           scoped and depends entirely on local Organization rows existing.
        5. `createOrganization` graph mints a fresh `uuid` as the aggregate id
           and emits `Organization create` — fully decoupled from Auth0 org
           ids. No Organization row exists for `org_uZUWhpWgK54VWC2X`, so
           `/api/organizations` returns [] -> UI shows /no-org.
        6. identity-auth0 handlers expose ListOrganizations (ALL orgs),
           ListMemberships (requires organization_id), GetOrganization. There
           is NO "list organizations for a given user" capability wired
           (Auth0 `GET /api/v2/users/{id}/organizations` is not in the adapter).

        Everything else (projects, tokens, deployments) is consistently keyed
        by the Auth0 org id `org_uZUWhpWgK54VWC2X`; only the `organizations`
        service uses its own UUID-keyed aggregate.
      decision_inputs_for_T007:
        contract_supports_org: "Session.organization_id (proto field 4) and Session.roles (field 6) already exist — no contract change needed to carry org on the session."
        path_a_token_claim: |
          Org-aware login. Change the SPA login to be organization-scoped
          (pass `organization` to loginWithRedirect or enable org login on the
          Auth0 SPA client) so the access token carries `org_id`; add
          org_id/org_name to PUBLIC_CLAIMS and populate Session.organization_id
          in introspectJwtToSession; listOrganizations uses session.organization_id
          and auto-provisions the Organization aggregate keyed by that id when
          missing. Touches: modules/identity/auth0 (login client + introspect),
          organizations graphs. Cons: needs Auth0 SPA client config change +
          login-flow change; "which org" ambiguity if a user has many.
        path_b_server_side_membership: |
          Server-side membership resolution. Add a "list organizations for
          user" operation to the identity-auth0 adapter/handlers (Auth0
          `GET /api/v2/users/{id}/organizations`); listOrganizations graph
          resolves the user_id from IntrospectSession and returns that user's
          Auth0 orgs (optionally mirroring them into the Organization
          aggregate keyed by the Auth0 org id). Touches: modules/identity/auth0
          adapter+handlers (+ maybe a contract op), organizations graph. Pros:
          no login-flow / Auth0-client config change, works with the current
          token, naturally membership-scoped (also fixes the unscoped
          listOrganizations issue). Cons: adds an Auth0 Management API call on
          the org-list path; needs a new module operation.
        keying_requirement: "Whichever path: the platform Organization that ends up listed MUST be keyed by the Auth0 org id (`org_uZUWhpWgK54VWC2X`) so existing projects/tokens/deployments scoped by that id link to it. createOrganization's `uuid` node must be replaced/bypassed for the provisioning path."
      evidence:
        - "modules/identity/auth0/src/introspect-session.ts (PUBLIC_CLAIMS lines 15-29, Session population lines 83-90 — no org_id)"
        - "modules/identity/auth0/src/handlers.ts (operation wiring; IntrospectSession lines 262-268)"
        - "modules/identity/auth0/src/adapter.ts (Auth0 Management API calls; no per-user org listing)"
        - "modules/identity/auth0/client/index.ts (boot, loginWithRedirect with no organization param)"
        - "modules/identity/auth0/client/components/LoginScreen.tsx"
        - "modules/identity/auth0/module.json (provisioner.requires auth0Mgmt; edgeAuth introspection-sidecar)"
        - "modules/identity/auth0/src/provisioner.ts (organizationsCapability, organization_usage)"
        - "apps/platform/blueprint/services/organizations/graphs/listOrganizations.json (unscoped findMany)"
        - "apps/platform/blueprint/services/organizations/graphs/createOrganization.json (uuid-keyed emit)"
        - "apps/platform/blueprint/services/organizations/qsm/projections/OrganizationView.json"
        - "apps/platform/blueprint/services/app/ui/screens/no-org.spec.json"
        - "apps/platform/blueprint/project.json (routes, modules.identity publicConfig, postLoginRedirectPath /no-org)"
        - "contracts-identity-v1/proto/identity.proto:129-146 (Session.organization_id=4, roles=6 already exist)"
        - "platform.target.json (modules.identity-auth0.env = AUTH0_DOMAIN only — no runtime mgmt creds)"
      spawned_tasks:
        - T007
      next_task: T007
      changed_files:
