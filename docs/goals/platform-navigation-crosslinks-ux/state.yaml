        - "T007: Worker — Slice D polish (per-row audit dispatch, deploy-target detail link if route added, project-version back-link, PlatformAPIExplorer endpoint→graph→PDM cross-links)."
        - "T008: Worker — Playwright/Puppeteer browser smoke harness for platform navigation (no harness exists)."
        - "T009: PM — confirm real docs URL with operator; replace topbar/no-org placeholder."

