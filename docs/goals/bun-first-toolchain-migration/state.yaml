# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Bun-First Toolchain Migration"
  slug: "bun-first-toolchain-migration"
  kind: existing_plan
  tranche: "Validate and execute the existing Bun-first migration plan through successive safe verified slices until the full original outcome is complete."
  status: active
  intake:
    original_request: "$goalbuddy yужно сделать goal из docs/superpowers/plans/2026-05-09-bun-first-toolchain-migration.md"
    interpreted_outcome: "Prepare a GoalBuddy board that can execute the Bun-first toolchain migration plan safely to completion."
    input_shape: existing_plan
    audience: "repo maintainers and future coding agents"
    authority: requested
    proof_type: test
    completion_proof: "All required Bun migration slices are implemented or explicitly adapted with receipts; bun install/build/typecheck/test/lint/depcruise/vendor:check pass; targeted SQLite/runtime/bindings checks pass; required Docker images build; banned dependency/import references are absent outside allowed historical docs; final audit records full_outcome_complete: true."
    likely_misfire: "Stopping after board creation, plan validation, or one migration slice even though the source plan defines a repo-wide migration."
    blind_spots_considered:
      - "The source plan may have drifted from current code and package metadata."
      - "The migration spans package management, tests, runtime serving, SQLite, bundling, Docker, CI, and docs, so slice boundaries must stay narrow."
      - "Bun APIs differ from Vitest, Node server adapters, esbuild, and better-sqlite3 in ways that require targeted compatibility tests."
      - "Dirty-worktree changes must be preserved and worked around."
      - "Some verification commands, especially Docker builds, may be unavailable locally and must be recorded accurately if blocked."
    existing_plan_facts:
      - "Source plan: docs/superpowers/plans/2026-05-09-bun-first-toolchain-migration.md."
      - "Plan goal: replace pnpm + Node + Vitest + esbuild + tsx + better-sqlite3 with Bun as canonical package manager, runner, test runner, bundler, runtime, Docker base, and SQLite driver; keep tsc for typecheck and .d.ts emit."
      - "Plan architecture: big-bang migration with root workspace changes, package script rewrites, a new @rntme/sqlite port over bun:sqlite, Bun.serve, Bun.build, Dockerfile migration, CI updates, docs updates, and whole-repo verification."
      - "Plan contains 21 tasks: root bootstrap, CI, SQLite port, runtime/module SQLite migrations, Vitest to bun:test, Bun.serve, Bun.build, shebangs, Dockerfiles, gRPC compatibility regression, scripts, docs, and whole-repo verification."
      - "Plan out of scope: raw .ts package consumption, removing tsc, rewriting node:fs/node:crypto/Buffer/streams calls, bulk-editing docs/history/**."
      - "Plan-required sub-skill: use superpowers:subagent-driven-development or superpowers:executing-plans during implementation."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  scout: installed
  worker: installed
  judge: installed

active_task: T104

tasks:
  - id: T001
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Validate the existing Bun migration plan against current repo state and convert it into the first safe executable slice."
    inputs:
      - "docs/goals/bun-first-toolchain-migration/goal.md"
      - "docs/goals/bun-first-toolchain-migration/state.yaml"
      - "docs/superpowers/plans/2026-05-09-bun-first-toolchain-migration.md"
      - "AGENTS.md"
      - "docs/decision-system.md"
      - ".dependency-cruiser.cjs"
      - "package.json"
      - "current package README stubs and owner docs relevant to the first proposed slice"
    constraints:
      - "Read-only."
      - "Do not implement the migration."
      - "Do not edit product files."
      - "Preserve the source plan as facts but reject stale details when current code/docs disagree."
      - "Respect dirty-worktree safety; do not require reverting unrelated changes."
      - "Choose a first Worker slice that is reviewable, reversible, and has targeted verification."
    expected_output:
      - "Plan validation summary with current-state evidence."
      - "Decision on whether Task 1 from the source plan remains the correct first Worker slice or needs adaptation."
      - "Exact next Worker objective."
      - "allowed_files for the next Worker."
      - "verify commands for the next Worker."
      - "stop_if conditions for the next Worker."
      - "Any plan drift or blockers that require Scout/PM follow-up."
    receipt:
      result: done
      decision: "Task 1 from the source plan remains the correct first Worker slice, adapted to treat missing Bun on PATH as the first executable step."
      summary: "Current evidence shows the repo root is still pnpm-based: package.json has node/pnpm engines, packageManager pnpm@9.12.0, pnpm recursive scripts, and no root workspaces; pnpm-workspace.yaml and pnpm-lock.yaml exist; bunfig.toml and bun.lock do not exist. docs/decision-system.md already records Bun-first as locked-pending, so executing the root bootstrap does not require a new strategic decision. .dependency-cruiser.cjs has no root-toolchain-specific restriction that changes this slice. `bun --version` failed because bun is not on PATH, so the Worker must install or otherwise expose Bun before generating bun.lock."
      evidence:
        - "package.json"
        - "pnpm-workspace.yaml"
        - "pnpm-lock.yaml"
        - "docs/decision-system.md#3.7"
        - ".dependency-cruiser.cjs"
        - "`bun --version` -> command not found"
      next_allowed_task: T002
      next_worker:
        objective: "Replace the repo root pnpm workspace bootstrap with Bun workspaces and generate bun.lock, without changing package-level scripts yet."
        allowed_files:
          - "package.json"
          - "bunfig.toml"
          - "bun.lock"
          - "pnpm-workspace.yaml"
          - "pnpm-lock.yaml"
        verify:
          - "bun --version"
          - "bun install"
          - "test -f bun.lock && test ! -f pnpm-workspace.yaml && test ! -f pnpm-lock.yaml"
          - "bun pm ls --top"
          - "git diff --check -- package.json bunfig.toml bun.lock pnpm-workspace.yaml pnpm-lock.yaml"
        stop_if:
          - "Bun cannot be installed or made available on PATH in this environment."
          - "bun install fails in a way that requires editing package-level metadata outside allowed_files."
          - "Need files outside allowed_files."
          - "A destructive action outside deleting pnpm-workspace.yaml and pnpm-lock.yaml is required."

