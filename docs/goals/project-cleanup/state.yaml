        - "Delete untracked .rntme*.jsonl logs, .rntme-ui-build output, .goalbuddy-board output, and duplicate .clone/** after a separate Judge decision."
        - "Decide whether untracked done GoalBuddy goal folders should be tracked, archived, or deleted."
        - "Historical GoalBuddy receipts may retain point-in-time references to deleted plan files unless a later audit requires full historical link cleanup."

