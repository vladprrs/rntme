# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Platform Project Dashboard Overview"
  slug: "platform-project-dashboard-overview"
  kind: specific
  tranche: "Complete the apps/platform project dashboard overview end-to-end, including UI, required API/PDM/QSM/data-flow work, deploy/release fixes if needed, Dokploy redeploy, browser verification, and final audit."
  status: done
  intake:
    original_request: "Привести dashboard apps/platform в .tmp/rntme platform/project-dashboard-overview помимо UI доработай нужные ручки, PDM/QSM и тд. для того чтобы реализовать полноценно .tmp/rntme-ux-design.agent.final.md"
    interpreted_outcome: "The apps/platform project dashboard overview matches the UX target and works end-to-end on real platform data flows after release Dokploy redeploy and browser verification."
    input_shape: specific
    audience: "platform dashboard users and operators"
    authority: requested
    proof_type: demo
    completion_proof: "Targeted tests/typecheck pass, required docs-touch evaluation is complete, release Dokploy redeploy is performed, and the dashboard is browser-verified against the deployed release using the verification pattern recovered from docs/goals/platform-full-ux-scenarios."
    likely_misfire: "Stopping at a polished UI without implementing required handlers, PDM/QSM projections, runtime data integration, deploy/release changes, redeploy, or deployed browser verification."
    blind_spots_considered:
      - "Dokploy release verification may require credentials, a live environment, or production-like access."
      - "docs/goals/platform-full-ux-scenarios is a reference for method, not current-state truth."
      - "The design target may imply backend/PDM/QSM fields that do not exist yet."
      - "Deploy/release flow changes are in scope only when required for dashboard verification."
      - "Docs-touch evaluation must happen before completion."
    existing_plan_facts:
      - "Use .tmp/rntme-ux-design.agent.final.md as the UX/design target."
      - "Preserve the user's reference to .tmp/rntme platform/project-dashboard-overview as target context to validate during Scout."
      - "Inspect docs/goals/platform-full-ux-scenarios to recover the prior browser/Dokploy verification approach."
      - "Primary outcome is an end-to-end dashboard, not UI fidelity alone."
      - "Completion includes redeploy."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  # installed | bundled_not_installed | missing | unknown
  # If non-installed, /goal can continue through PM fallback; install agents before /goal only when dedicated delegation is required.
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  # none | local | github_projects | both | unknown
  selected: none
  local:
    status: not_requested
    url: null
    command: "npx goalbuddy board docs/goals/platform-project-dashboard-overview"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

