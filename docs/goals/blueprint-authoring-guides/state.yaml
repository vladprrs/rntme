# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Blueprint Authoring Guides"
  slug: "blueprint-authoring-guides"
  kind: existing_plan
  tranche: "Implement the approved guide-set design for external-agent blueprint authoring under docs/current/guides."
  status: complete
  intake:
    original_request: "$goalbuddy:goal-prep подготовь цель по реализации docs/superpowers/specs/2026-05-16-blueprint-authoring-guides-design.md"
    interpreted_outcome: "Prepare and then execute a GoalBuddy board that updates docs/current/guides into the approved practical blueprint-authoring guide set."
    input_shape: existing_plan
    audience: "External coding agents authoring rntme blueprints."
    authority: approved
    proof_type: artifact
    completion_proof: "The approved guide set exists in docs/current/guides, forbidden paths appear only as explicit warnings, examples align with current demo fixtures, local checks pass, and final audit maps implementation to the design spec."
    likely_misfire: "Producing stale reference docs or broad package inventories instead of a practical external-agent authoring playbook."
    blind_spots_considered:
      - "Existing guides are stale relative to operation-era Graph IR and bindings."
      - "QSM uses relations, not removed relationRoles."
      - "Native handlers exist internally but must not be documented as third-party authoring."
      - "Modules exist but module authoring is out of scope."
      - "Deploy is explicitly out of scope."
      - "Examples must correspond to current demo blueprints or be compact valid snippets."
    existing_plan_facts:
      - "Source design spec: docs/superpowers/specs/2026-05-16-blueprint-authoring-guides-design.md."
      - "Use compact guide-set approach: entrypoint plus narrow authoring guides."
      - "Target docs/current/guides as the main edit surface."
      - "Modules are mention-only."
      - "Deploy is out of scope."
      - "Native handlers, operations.json, handlers/*.ts, target.engine:\"native\", and workflow nativeTasks are forbidden as recommended external authoring paths."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  selected: none
  local:
    status: not_requested
    url: null
    command: "npx goalbuddy board docs/goals/blueprint-authoring-guides"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: default
    objective: "Map the current docs/current/guides files, owner docs, demo blueprints, and verification commands against the approved design spec."
    inputs:
      - "docs/superpowers/specs/2026-05-16-blueprint-authoring-guides-design.md"
      - "docs/current/guides/"
      - "docs/current/owners/packages/artifacts/blueprint.md"
      - "docs/current/owners/packages/artifacts/pdm.md"
      - "docs/current/owners/packages/artifacts/qsm.md"
      - "docs/current/owners/packages/artifacts/graph-ir-compiler.md"
      - "docs/current/owners/packages/artifacts/bindings.md"
      - "docs/current/owners/packages/artifacts/ui.md"
      - "docs/current/owners/packages/artifacts/workflows.md"
      - "demo/notes-blueprint/"
      - "demo/order-fulfillment-blueprint/"
      - "demo/cv-extract-blueprint/"
    constraints:
      - "Read-only."
      - "Do not edit docs/current/guides yet."
      - "Prefer concrete file-path evidence over generic documentation advice."
      - "Flag any design-spec assumption that conflicts with current owner docs or demo fixtures."
    expected_output:
      - "Evidence map from design guide names to current source files and examples."
      - "List of stale/current guide issues that implementation must fix."
      - "Recommended verification commands."
      - "Risks or ambiguous scope items for Judge."
    receipt: |
      Scout evidence map:
      - Existing guide files are only bindings-authoring.md, bindings-examples.md, graph-ir-authoring.md, and graph-ir-examples.md; the approved entrypoint, project structure, PDM, QSM, split Graph IR query/operation, UI, workflows, seed, and blueprint examples guides are missing.
      - Owner docs confirm current sources: blueprint loads project.json, pdm/pdm.json plus pdm/entities/*.json, services/<svc> optional qsm/graphs/bindings/ui/seed/storage, and workflows/workflows.json; PDM state machines drive event types; QSM uses projections plus relations, not relationRoles; Graph IR operation path supports call, branch, uuid, emit, result; bindings require exposure read/action.
      - Demo evidence: demo/notes-blueprint has authenticated read/action Graph IR operations, bindings with exposure/inputFrom, UI data/actions, QSM entity mirror, and seed; demo/order-fulfillment-blueprint has workflows mapping BPMN service tasks to project-routed action bindings plus branch/emit operation examples; demo/cv-extract-blueprint shows module-backed AI/storage calls and UI/storage patterns without teaching module authoring.
      Stale/current guide issues:
      - docs/current/guides/graph-ir-authoring.md still documents removed QSM relationRoles.
      - docs/current/guides/bindings-authoring.md is pre-exposure and says only rowset output can be bound, conflicting with current row/rowset binding owner doc.
      - Existing graph/bindings example files are package-reference style and do not point external agents through current project-blueprint authoring order.
      - Missing guide family must be created under docs/current/guides without editing owner docs unless a real owner-doc defect appears.
      Verification commands:
      - rg -n "relationRoles|target\\.engine.*native|operations\\.json|handlers/|nativeTasks" docs/current/guides
      - rg -n "exposure" docs/current/guides/bindings-authoring.md
      - rg -n "deploy|Dokploy|target set-config|project deploy" docs/current/guides
      - bun -e "import { loadComposedBlueprint } from './packages/artifacts/blueprint/src/index.js'; const r = await loadComposedBlueprint('demo/notes-blueprint'); if (!r.ok) { console.error(JSON.stringify(r.errors, null, 2)); process.exit(1); } console.log('OK');"
      Current verification:
      - Forbidden-path grep currently finds relationRoles in graph-ir-authoring.md.
      - exposure grep currently finds nothing in bindings-authoring.md.
      - deploy grep currently finds nothing in docs/current/guides.
      - notes-blueprint composition command prints OK.
      Risks for Judge:
      - Keep native handlers as explicit warnings only, because bindings/runtime still support target.engine native internally.
      - Keep module examples by reference only; do not teach module implementation.
      - Preserve legacy graph-ir-authoring.md and graph-ir-examples.md only as short redirects/compatibility indexes if needed so stale references do not remain parallel truth.

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Validate the implementation approach from the design spec and Scout evidence, then choose the first safe Worker package."
    inputs:
      - "T001 receipt"
      - "docs/superpowers/specs/2026-05-16-blueprint-authoring-guides-design.md"
    constraints:
      - "Do not implement."
      - "Reject any approach that teaches native handlers, module authoring, or deploy."
      - "Pick the largest safe useful documentation slice with allowed_files, verify commands, and stop conditions."
    expected_output:
      - "Decision: approved | revise_board | blocked."
      - "Exact first Worker objective."
      - "allowed_files."
      - "verify commands."
      - "stop_if conditions."
      - "Any board edits required before Worker starts."
    receipt: |
      Decision: approved.
      First Worker objective:
      - Implement the entrypoint and foundation guide slice: blueprint-authoring.md, project-structure-authoring.md, pdm-authoring.md, and qsm-authoring.md.
      Allowed files:
