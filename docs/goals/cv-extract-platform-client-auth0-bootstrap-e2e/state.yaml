          status: pass

  - id: T007
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Choose the exact architectural fix to reconcile the platform organizations service with Auth0 org ids, given the operator chose the proper fix. Decide auto-provision-on-login vs. createOrganization keyed by session org_id, and whether listOrganizations should become membership-scoped."
    inputs:
      - "T006 receipt"
      - "outcome_clarification_2026_05_14"
      - "platform.target.json modules.identity-auth0.env (runtime env)"
    constraints:
      - "Do not implement."
      - "The platform Organization must end up keyed by the Auth0 org id so existing projects/tokens/deployments scoped by org_uZUWhpWgK54VWC2X link up."
      - "Prefer the smallest correct change that does not break existing platform blueprint tests."
    expected_output:
      - "Decision with rationale"
      - "Exact Worker objective for T008"
      - "allowed_files"
      - "verify"
      - "stop_if"
    receipt:
      result: done
      updated_at: "2026-05-14T09:25:00Z"
      decision: "Path A — org context from the JWT. Reject Path B (runtime server-side membership resolution)."
      rationale: |
        Decisive constraint from T006 + platform.target.json: the deployed
        identity-auth0 module's runtime env is ONLY `AUTH0_DOMAIN`. It has NO
        Auth0 Management API credentials at runtime — those exist solely for
        the deploy-time provisioner (`provisioner.requires: auth0Mgmt`). So the
        runtime module can only do JWKS-based `IntrospectSession` (public
        keys, no creds). Path B would require either injecting Management
        creds into the runtime (a sensitive infra change, broadens the runtime
        secret surface) or a new credential path — both larger and riskier
        than the operator's "smallest correct" intent.

        Path A keeps everything inside what the runtime already trusts: the
        validated JWT. The Session contract already has `organization_id`
        (proto field 4) and `roles` (field 6), so no contract change is
        needed. `IntrospectSession` already runs at the edge and in the
        listOrganizations graph; teaching it to surface the token's `org_id`
        claim is a pure, TDD-able change with zero new infra dependency.
      worker_plan_T008:
        summary: |
          Three coordinated slices, implemented in this order so the first is
          pure and fully verifiable before touching live-config-sensitive
          parts:

          Slice 1 (pure, TDD): modules/identity/auth0/src/introspect-session.ts
          — add `org_id` and `org_name` to PUBLIC_CLAIMS, and populate
          `Session.organization_id` from the `org_id` claim (and `Session.roles`
          from any roles/permissions claim if cheaply available). Add unit
          tests proving a JWT carrying `org_id` yields a Session with
          organization_id set, and a JWT without it yields empty (back-compat).

          Slice 2: make the SPA login organization-aware so the issued access
          token carries `org_id`. In modules/identity/auth0/client/index.ts,
          pass `organization` through to `loginWithRedirect` when known, and
          support an Auth0 `organization_usage: 'require'`-style prompt so a
          user with org membership is asked to select their org at login.
          Extend the provisioner's `organizationsCapability` handling
          (modules/identity/auth0/src/provisioner.ts) and project.json
          publicConfig if needed so the platform SPA client is provisioned
          org-aware. Verify the live platform SPA client's current
          `organization_usage` first; if already 'allow', the smallest change
          may be only the client-side `organization` param + a tenant/client
          setting.

          Slice 3: organizations service keyed by Auth0 org id. Change
          listOrganizations graph to scope by `session.organization_id` and to
          surface the org even when the local Organization aggregate has no
          row yet (auto-provision on first authenticated list, OR return the
          session-derived org directly). Change createOrganization to key the
          Organization aggregate by the Auth0 org id from the session instead
          of minting a fresh uuid. The Organization row that ends up listed
          MUST have id == the Auth0 org id so existing cv-extract
          projects/tokens/deployments scoped by org_uZUWhpWgK54VWC2X link up.
        notes: |
          If Slice 2's exact Auth0 mechanism proves uncertain against the live
          test tenant, T008 may use the approved Auth0 Management creds to
          inspect/adjust the test SPA client's organization settings and
          confirm a login issues an org-scoped token — this is test-tenant
          automation, consistent with the goal's existing Auth0 authority.
          stop_if covers escalation back to Judge if a slice is infeasible.
      next_allowed_task: T008
      blocked_tasks: []

