# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Platform Data Model Explorer"
  slug: "platform-data-model-explorer"
  kind: existing_plan
  tranche: "continuous execution: implement the platform data-model explorer end to end across UI, routes/API handlers, PDM/QSM data plumbing, verification, and required docs touches"
  status: done
  intake:
    original_request: "$goalbuddy:goal-prep Привести просмотр моделей данных в apps/platform к виду .tmp/rntme platform/data-model-explorer помимо UI доработай нужные ручки, PDM/QSM и тд. для того чтобы реализовать полноценно .tmp/rntme-ux-design.agent.final.md"
    interpreted_outcome: "The platform data-model explorer matches the supplied UX target and is backed by real platform API/data-model behavior rather than static UI."
    input_shape: existing_plan
    audience: "platform users/operators inspecting project data models"
    authority: requested
    proof_type: demo
    completion_proof: "A final audit proves the explorer UX matches the supplied .tmp inputs, renders real data through platform routes/handlers and PDM/QSM plumbing, passes focused verification, and records any required docs updates or a justified no-docs decision."
    likely_misfire: "A visually similar static explorer is added while routes, handlers, PDM/QSM projections, artifact data, errors, or verification remain incomplete."
    blind_spots_considered:
      - ".tmp materials are inputs to validate, not current-state truth."
      - "The current platform and UI-module owner docs may constrain route, component, and data-binding conventions."
      - "PDM/QSM changes may cross artifact/compiler/runtime boundaries and must respect dependency-cruiser layering."
      - "Data model explorer content may require artifact-body access, derived projections, or new handler operations; Judge must choose the smallest coherent architecture before Worker writes."
      - "Completion needs backend/data proof, not only screenshot similarity."
      - "Docs-touch evaluation is mandatory for public API, invariants, gotchas, or navigation changes."
    existing_plan_facts:
      - "Target app: apps/platform."
      - "UX target path: .tmp/rntme platform/data-model-explorer."
      - "Design/rationale input: .tmp/rntme-ux-design.agent.final.md."
      - "Scope explicitly includes UI plus required routes/handlers, PDM, QSM, and related data plumbing."
      - "AGENTS.md requires research -> plan -> implement for non-trivial work."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  # Dedicated GoalBuddy role-agent configs were not found in the checked local/project locations,
  # but bundled goal_scout/goal_worker/goal_judge templates exist with the installed skill.
  # /goal can proceed through PM fallback when dedicated agents are unavailable.
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  selected: none
  local:
    status: not_requested
    url: null
    command: "npx goalbuddy board docs/goals/platform-data-model-explorer"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

