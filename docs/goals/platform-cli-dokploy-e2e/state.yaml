version: 2

goal:
  title: "Platform CLI Dokploy E2E"
  slug: "platform-cli-dokploy-e2e"
  kind: specific
  tranche: "Continue from the proven preview e2e to a canonical platform.rntme.com deploy, allowed cleanup, GitHub Projects sync through gh, and autonomous PR/merge finishing."
  status: complete
  intake:
    original_request: "Plan a full e2e deploy test of apps/platform through apps/cli to Dokploy, solving problems sequentially under docs/decision-system.md."
    interpreted_outcome: "A real CLI-driven Dokploy deployment of apps/platform is completed, verified, and documented through GoalBuddy receipts, with encountered blockers fixed or explicitly tracked."
    input_shape: specific
    audience: "repository owner / platform deploy maintainer"
    authority: requested
    proof_type: test
    completion_proof: "Receipts show the exact CLI deploy command path, Dokploy target evidence, deployed platform smoke/health verification, and final Judge/PM audit with full_outcome_complete: true."
    likely_misfire: "Stopping at a plan, local-only build/test success, or direct Dokploy action without proving apps/cli deploys apps/platform end to end."
    blind_spots_considered:
      - "Live Dokploy operations can mutate remote infrastructure; destructive actions need explicit task-level treatment."
      - "Secrets must not be persisted in goal files, logs, commits, issues, or PRs."
      - "The approved design spec is rationale; current docs/code/tests must be verified before implementation."
      - "Failures should be classified against docs/decision-system.md rather than patched ad hoc."
      - "Platform bootstrap/direct/client mode boundaries must stay consistent with the CLI universal deploy design."
    existing_plan_facts:
      - "Design context: docs/superpowers/specs/2026-05-10-cli-universal-deploy-and-platform-http-removal-design.md"
      - "Decision authority: docs/decision-system.md"
      - "Deploy subject: apps/platform"
      - "Deploy entry point: apps/cli"
      - "Deploy target: Dokploy"
      - "Environment: .env supplies DOKPLOY_URL and DOKPLOY_API_KEY; do not copy secret values into board artifacts."
      - "Requested behavior: do not block at first problem; solve discovered problems sequentially."
    operator_followup_2026_05_12:
      - "GitHub Projects sync may use gh; if ProjectV2 access is blocked by token scopes, use gh auth refresh or an equivalent GH_TOKEN/GITHUB_TOKEN refresh with project scopes."
      - "Destructive Dokploy cleanup is allowed when needed for this goal, except resources/projects/apps named or owned by cv-cms, landing, or multica must not be touched."
      - "Desired final platform URL is https://platform.rntme.com if feasible; prove the scenario works there unless a Judge records why the canonical domain is unsafe or unavailable."
      - "Use superpowers:finishing-a-development-branch before final integration, then create the PR and merge it autonomously once required verification passes."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  scout: missing
  worker: missing
  judge: missing

visual_board:
  selected: github_projects
  local:
    status: not_requested
    url: null
    command: "npx goalbuddy board docs/goals/platform-cli-dokploy-e2e"
  github_projects:
    status: blocked
    url: "https://github.com/users/vladprrs/projects/3"
    command: "npx goalbuddy extend github-projects"
    missing:
      - "GitHub token lacks read:project scope; live ProjectV2 sync could not read project metadata."

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Map the current CLI/platform/deploy implementation and identify the exact safe e2e command path to deploy apps/platform to Dokploy."
    inputs:
      - "docs/decision-system.md"
      - "docs/superpowers/specs/2026-05-10-cli-universal-deploy-and-platform-http-removal-design.md"
      - "apps/cli/README.md and its current owner doc"
      - "apps/platform/README.md and its current owner doc"
      - "packages/deploy/deploy-runner/README.md and its current owner doc"
      - "packages/deploy/deploy-dokploy/README.md and its current owner doc"
      - "package.json scripts relevant to CLI/platform/deploy"
      - ".env variable names only; never record secret values"
    constraints:
      - "Read-only."
      - "Do not run the deploy yet."
      - "Do not edit implementation files."
      - "Do not print or persist DOKPLOY_API_KEY."
      - "Treat specs as rationale, not current-state truth; verify current docs/code/tests."
    expected_output:
      - "Current implementation map with file-path evidence."
      - "Exact proposed CLI command(s) for the first deploy attempt."
      - "Required environment variables and whether they are present, without values."
      - "Safety classification of remote Dokploy actions needed for the attempt."
      - "Candidate verification commands and smoke checks."
      - "Known likely blockers or missing pieces."
      - "Recommended next Judge decision input."
    receipt:
      result: done
      summary: |
        Current implementation matches the approved CLI universal deploy path:
        `apps/cli/src/bin/cli.ts` dispatches `rntme platform up --target <file>`
        to `apps/cli/src/commands/platform/up.ts`, which locates
        `apps/platform/blueprint` and delegates to direct deploy. Direct deploy
        loads the target JSON, resolves env-ref secrets, composes the blueprint,
        and calls `@rntme/deploy-runner` with a Dokploy client factory.

        `platform.target.json` already exists at the repo root and contains only
        env-var references. It targets Dokploy project `rntme-platform`,
        production environment, with provisioned Redpanda event bus, provisioned
        Operaton workflow engine, Auth0 target config, and nested `auth0Mgmt`
        env refs. `.env` presence was checked by name only: `DOKPLOY_URL`,
        `DOKPLOY_API_KEY`, `AUTH0_DOMAIN`,
        `AUTH0_MANAGEMENT_CLIENT_ID`, and
        `AUTH0_MANAGEMENT_CLIENT_SECRET` are present.

        Dokploy read-only checks show `rntme-platform/production` is empty
        (applications=[], compose=[], postgres=[]), while the old `runtime`
        project contains only the landing app in `done` state. Existing prior
        receipts under `docs/goals/dokploy-platform-e2e-deploy/` show the old
        platform-http/rustfs/postgres resources were removed and the CLI target
        support gates passed.
      evidence:
        - "CLI dispatch: apps/cli/src/bin/cli.ts platform up branch."
        - "Platform wrapper: apps/cli/src/commands/platform/up.ts delegates to runDirectDeploy."
        - "Direct runner: apps/cli/src/commands/deploy.ts resolves target, secrets, blueprint, and calls runDirectDeployment."
        - "Target schema: apps/cli/src/deploy-engine/{target-schema,load-target,load-secrets}.ts supports workflows, auth.auth0, and nested extras."
        - "Platform owner doc: apps/platform is served through @rntme/runtime from apps/platform/blueprint; no apps/platform-http."
        - "Deploy-runner owner doc: runDeployment is consumed by CLI direct-mode."
        - "Dokploy MCP project.one(wmiyt_0T7SKvS3sr6rzGK): production env empty."
      proposed_cli_command: "set -a; . ./.env; set +a; bun run --filter @rntme/cli build && bun apps/cli/dist/bin/cli.js platform up --target platform.target.json --log-file docs/goals/platform-cli-dokploy-e2e/notes/platform-up-$(date -u +%Y%m%dT%H%M%SZ).jsonl"
      safety: "Non-destructive create/update apply into an empty Dokploy environment; no direct Dokploy mutation except read-only inspection before the CLI attempt. Stop before any delete/remove operation."
      likely_blockers:
        - "The live deploy may expose missing deploy-runner/deploy-core support for the platform blueprint after the prior CLI schema extension."
        - "Remote image pulls or Dokploy apply/verify can fail independently of local gates."
        - "Smoke endpoint may not be /healthz; verify must inspect rendered smoke report and HTTP responses."
  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Review Scout findings and approve the first safe e2e deploy attempt or choose the smallest prerequisite Worker fix."
    inputs:
      - "T001 receipt"
      - "docs/decision-system.md"
      - "Goal intake and non-negotiable constraints"
    constraints:
      - "Read-only."
      - "Do not run deploy commands."
      - "Reject approaches that bypass apps/cli as the e2e entry point."
      - "Reject fixes that contradict current decision-system bets unless the conflict is surfaced for user decision."
    expected_output:
      - "Decision: deploy_attempt | prerequisite_fix | blocked_specific_task"
      - "If deploy_attempt: exact command, env prerequisites, verify commands, stop_if conditions."
      - "If prerequisite_fix: exact Worker objective, allowed_files, verify, stop_if."
      - "If blocked_specific_task: missing requirement and next safe task that can still proceed."
    receipt:
      result: deploy_attempt
      summary: |
        Approved the first safe e2e deploy attempt through the required CLI
        path. The target environment is empty and the command uses
        `apps/cli` only; Dokploy MCP is reserved for read-only status/log
        verification around the attempt. No architecture conflict with
        `docs/decision-system.md`: this follows the CLI universal deploy front,
        deploy-runner orchestration, platform-as-blueprint, and no
        `apps/platform-http` bets.
      command: "set -a; . ./.env; set +a; bun run --filter @rntme/cli build && bun apps/cli/dist/bin/cli.js platform up --target platform.target.json --log-file docs/goals/platform-cli-dokploy-e2e/notes/platform-up-$(date -u +%Y%m%dT%H%M%SZ).jsonl"
      env_prerequisites:
        - "DOKPLOY_URL present in .env; used by platform.target.json as non-secret endpoint material."
        - "DOKPLOY_API_KEY present in .env; resolved as the Dokploy API secret."
        - "AUTH0_DOMAIN, AUTH0_MANAGEMENT_CLIENT_ID, AUTH0_MANAGEMENT_CLIENT_SECRET present in .env; resolved for Auth0 provisioning."
      verify:
        - "CLI command exits 0 and prints deployment succeeded."
        - "Log file exists under docs/goals/platform-cli-dokploy-e2e/notes/ and contains terminal ok without persisted secret values."
        - "Dokploy read checks show resources created in rntme-platform/production and reaching done/running state."
        - "HTTP smoke against https://platform.rntme.com/ or rendered smoke URL succeeds; protected API without token returns 401."
      stop_if:
        - "Any output would require recording secret values."
        - "Need destructive Dokploy action."
        - "Plan fails with DEPLOY_PLAN_* or render/apply/verify fails twice with the same unexplained error."
        - "A decision-system goal conflict is discovered."
  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: low
    objective: "Execute the Judge-approved first safe action: either the first CLI-to-Dokploy deploy attempt or the smallest prerequisite implementation fix."
    allowed_files:
      - "docs/goals/platform-cli-dokploy-e2e/state.yaml"
      - "docs/goals/platform-cli-dokploy-e2e/notes/platform-up-*.jsonl"
    verify:
      - "bun run --filter @rntme/cli build"
      - "bun apps/cli/dist/bin/cli.js platform up --target platform.target.json --log-file <goal-notes-log>"
      - "Dokploy MCP read-only project/environment checks for rntme-platform/production."
      - "HTTP smoke against deployed platform public URL."
    stop_if:
      - "Need files outside allowed_files for a code change."
      - "Need to reveal or persist secret values."
      - "Need destructive Dokploy action not approved by the active task."
      - "CLI command path differs from the Judge-approved command in a way that changes scope."
      - "Verification fails twice with the same unexplained failure."
      - "A decision-system goal conflict is discovered."
    receipt:
      result: blocked_specific_task
      summary: |
        CLI build succeeded and copied `apps/platform/blueprint` into
        `apps/cli/dist/platform-blueprint`. The first CLI deploy attempt did
        not reach Dokploy apply; it failed locally while converting the
        platform blueprint through `@rntme/deploy-bundle-input`.
      commands:
        - "bun run --filter @rntme/cli build → exit 0"
        - "bun apps/cli/dist/bin/cli.js platform up --target platform.target.json --log-file <goal-notes-log> → exit 1"
      failure:
        code: "DEPLOY_EXECUTOR_SERVICE_GRAPHS_NOT_FOUND"
        message: "DEPLOY_EXECUTOR_SERVICE_GRAPHS_NOT_FOUND:app"
        location: "packages/platform/deploy-bundle-input/src/to-deploy-core-input.ts buildRuntimeArtifactFiles"
      diagnosis: |
        Root cause investigation shows `apps/platform/blueprint/services/app`
        is a UI-only domain service. Blueprint composition accepts that shape
        and compiles the UI against the project binding registry, but
        `deploy-bundle-input` assumes every domain service has graphs, QSM, and
        bindings before emitting runtime files. The relevant prior plan
        `docs/superpowers/plans/2026-05-11-sustained-cutover-thin-platform.md`
        already names this as Slice A.
      log_file: "A log file was opened under docs/goals/platform-cli-dokploy-e2e/notes/, but the process failed before deploy-runner emitted JSONL events."
  - id: T004
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Classify the first deploy/fix result and choose the next sequential problem-solving slice."
    inputs:
      - "T003 receipt"
      - "Command output summaries with secrets redacted"
      - "Any changed files or blocked conditions"
    constraints:
      - "Read-only."
      - "Do not mark complete unless the full e2e deploy and smoke proof already exist."
      - "Prefer the smallest next fix that moves the same e2e path forward."
    expected_output:
      - "Problem classification: implementation_bug | docs_gap | environment_issue | remote_target_issue | decision_conflict | complete_candidate"
      - "Next Worker objective or final audit activation."
      - "allowed_files, verify, and stop_if for the next Worker if not complete."
    receipt:
      result: prerequisite_fix
      summary: |
        Classified the failed CLI deploy as an implementation bug in
        `@rntme/deploy-bundle-input`, not a remote Dokploy issue. Approved the
        smallest prerequisite Worker slice: implement the UI-only domain
        service behavior described in the existing sustained-cutover plan.
        This aligns with the decision system because UI-only services are still
        blueprint-authored artifacts and preserve the canonical CLI → deploy
        runner path.
      worker_objective: "Allow deploy-bundle-input to emit UI-only runtime files for domain services with UI but no graph/qsm/bindings, while throwing a new partial-artifacts error when only some of graph/qsm/bindings are present."
      allowed_files:
        - "packages/platform/deploy-bundle-input/src/to-deploy-core-input.ts"
        - "packages/platform/deploy-bundle-input/test/to-deploy-core-input.test.ts"
        - "docs/goals/platform-cli-dokploy-e2e/state.yaml"
      verify:
        - "bun run --filter @rntme/deploy-bundle-input test"
        - "bun run --filter @rntme/deploy-bundle-input typecheck"
        - "bun run --filter @rntme/cli build"
        - "set -a; . ./.env; set +a; bun apps/cli/dist/bin/cli.js platform up --target platform.target.json --log-file <goal-notes-log>"
      stop_if:
        - "Runtime needs a larger precompiled-UI contract change instead of deploy-bundle-input-only changes."
        - "Any fix would bypass apps/cli or revive apps/platform-http."
  - id: T005
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: low
    objective: "Allow deploy-bundle-input to package UI-only domain services, then rerun the CLI platform deploy attempt."
    allowed_files:
      - "packages/platform/deploy-bundle-input/src/to-deploy-core-input.ts"
      - "packages/platform/deploy-bundle-input/test/to-deploy-core-input.test.ts"
      - "docs/goals/platform-cli-dokploy-e2e/state.yaml"
    verify:
      - "bun run --filter @rntme/deploy-bundle-input test"
      - "bun run --filter @rntme/deploy-bundle-input typecheck"
      - "bun run --filter @rntme/cli build"
      - "set -a; . ./.env; set +a; bun apps/cli/dist/bin/cli.js platform up --target platform.target.json --log-file <goal-notes-log>"
    stop_if:
      - "Need files outside allowed_files."
      - "Need to reveal or persist secret values."
      - "Need destructive Dokploy action not approved by the active task."
      - "Verification fails twice with the same unexplained failure."
      - "A decision-system goal conflict is discovered."
    receipt:
      result: done_then_next_blocker
      summary: |
        Implemented the UI-only domain service fix in
        `@rntme/deploy-bundle-input`, with regression coverage against the
        actual platform blueprint. Package tests/typecheck and builds passed.
        Retrying the CLI deploy then passed `compose` and reached `provision`,
        proving the previous `DEPLOY_EXECUTOR_SERVICE_GRAPHS_NOT_FOUND:app`
        blocker is cleared.
      changed_files:
        - "packages/platform/deploy-bundle-input/src/to-deploy-core-input.ts"
        - "packages/platform/deploy-bundle-input/test/to-deploy-core-input.test.ts"
      verification:
        - "bun run --filter @rntme/deploy-bundle-input test → 3 pass"
        - "bun run --filter @rntme/deploy-bundle-input typecheck → exit 0"
        - "bun run --filter @rntme/deploy-bundle-input build → exit 0"
        - "bun run --filter @rntme/cli build → exit 0"
        - "CLI platform up retry reached compose/provision, then failed on provisioner entry resolution."
      next_blocker:
        code: "DEPLOY_PROVISION_ENTRY_LOAD_FAILED"
        message: "Cannot find module '@rntme/identity-auth0/./dist/provisioner.entry.js' from apps/cli/dist/platform-blueprint/package.json"
        classification: "implementation_bug"
        rationale: "The bundled platform blueprint excludes node_modules and provisioner entry files; `createCliResolveProvisioner` only resolves through package resolution from the bundle directory."
  - id: T006
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Bundle platform module provisioner entries into the CLI dist and make direct-mode provisioner resolution prefer the bundled manifest before package resolution, then rerun the CLI platform deploy attempt."
    allowed_files:
