      note: "docs/goals/platform-navigation-crosslinks-ux/notes/T002-judge-slice-AB.md"
      next_allowed_task: T003
      blocked_tasks: []
      spa_link_interception_decision: "defer to separate gated task (Slice C); after Slice A+B, full-page reloads still happen but pages render correctly under the right route — UX is functional"
      followups_to_queue:
