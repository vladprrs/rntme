  - id: T011
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: >-
      Audit the T005 artifact-summary slice, then phase the remaining work
      toward the operator outcome (inspect all artifacts on the platform):
      artifact-body access + the explorer screens + remaining hardcoded
