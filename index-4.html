<script type="text/babel">
const { useEffect, useRef, useState } = React;

// ---------- primitives ----------
function SectionLabel({ children }) { return <div className="section-label">{children}</div>; }
function ExtIcon() {
  return (<svg className="btn-ext" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
    <path d="M5.5 3h-2A1.5 1.5 0 0 0 2 4.5v6A1.5 1.5 0 0 0 3.5 12h6a1.5 1.5 0 0 0 1.5-1.5v-2"/>
    <path d="M8 2h4v4"/><path d="m6.5 7.5 5-5"/></svg>);
}
function Chev() {
  return (<svg className="chev" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"><path d="m5 3 4 4-4 4"/></svg>);
}
function Button({ variant="primary", href, children, external }) {
  return (<a className={`btn btn-${variant}`} href={href||"#"} rel={external?"noopener":undefined}>
    {children}{external && <ExtIcon/>}</a>);
}
function SectionMarker({ num, label, right }) {
  return (<div className="section-marker" aria-hidden="true">
    <span className="mk-left">§{num} · {label}</span>
    <span className="mk-right">{right}</span>
  </div>);
}

// ---------- Status bar ----------
function StatusBar() {
  return (<div className="statusbar">
    <div className="statusbar-inner">
      <div className="statusbar-left">
        <span className="statusbar-brand">rntme</span>
        <span>/ pilot</span>
        <span>·</span>
        <span>v0.1.0-pilot</span>
      </div>
      <div className="statusbar-right">
        <span className="statusbar-dot" aria-hidden="true"/>
        <span>onboarding — 3 of 10</span>
        <span>·</span>
        <a href="#github">github</a>
      </div>
    </div>
  </div>);
}

// ---------- Side rail ----------
const rail = [
  ["01","Hero"],["02","Jobs"],["03","Compile"],["04","Demo"],["05","Shift"],
  ["06","Steps"],["07","Q&A"],["08","Compare"],["09","Apply"],["10","End"],
];
function SideRail() {
  const [active, setActive] = useState("01");
  useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const n = e.target.getAttribute("data-section-num");
          if (n) setActive(n);
        }
      });
    }, { threshold: 0.35 });
    document.querySelectorAll("[data-section-num]").forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
  return (<nav className="siderail" aria-label="Section index">
    {rail.map(([n,l]) => (
      <a key={n} href={`#s${n}`} className={active===n?"is-active":""}>
        <span className="sr-tick">§{n}</span><span>{l}</span>
      </a>
    ))}
  </nav>);
}

// ---------- §1 Hero ----------
function Hero() {
  return (<section className="section hero" data-section-num="01" data-screen-label="01 Hero" id="s01">

// ---------- §3 AhaReveal ----------
const ahaPanels = [
  { k:"01", title:"A ticket arrives",        body:"A JSON body hits POST /tickets. It describes a change in product terms: the what, not the how." },
  { k:"02", title:"The spec validates",      body:"Fields are typed. Ambiguities are rejected with a line number. The writer knows before the compiler does." },
  { k:"03", title:"The runtime compiles it", body:"We translate the spec into service code, tests, and the reverse operation — in that order." },
  { k:"04", title:"The event log records",   body:"Everything is appended. Replay the log and you reconstruct the system state." },
];
function AhaReveal() {
  const rootRef = useRef(null);
  useEffect(() => {
    const els = rootRef.current?.querySelectorAll("[data-reveal]") ?? [];
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e, i) => {
        if (e.isIntersecting) {
          setTimeout(()=>e.target.setAttribute("data-revealed","true"), i*80);
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.3, rootMargin: "0px 0px -10% 0px" });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
  return (<section className="section aha" data-section-num="03" data-screen-label="03 AhaReveal" id="s03" ref={rootRef}>
    <SectionMarker num="03" label="See it compile" right="Fig. 01 — ticket schema"/>
    <SectionLabel>See it compile</SectionLabel>
    <h2>The shift from prompt to spec.</h2>
    <p className="lede">A prompt asks for code. A spec <a className="aha-link" href="#">describes a change</a>. The difference shows up at hour 48, when you have to explain what the system does.</p>
    <div className="aha-grid">
      <figure className="aha-figure">
        <pre className="aha-code"><code>{`POST /tickets
{
  "title":    "price rule per sku",
  "effect":   "apply discount at checkout",
  "when":     "cart.contains(sku) && qty >= 3",
  "discount": { "pct": 15, "cap": 25.00 },
  "rollback": "revert to baseline price",
  "owner":    "pricing-guild"
}`}</code></pre>
        <figcaption className="figcaption"><b>Fig. 01</b>One input. Four effects. Keep reading →</figcaption>
      </figure>
      <ol className="aha-panels">{ahaPanels.map(p=>(
        <li key={p.k} className="aha-panel" data-reveal>
          <div className="aha-k">{p.k}</div>
          <div><h3>{p.title}</h3><p>{p.body}</p></div>
        </li>))}
      </ol>
    </div>
  </section>);
}
