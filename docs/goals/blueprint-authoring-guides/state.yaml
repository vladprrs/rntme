      - docs/current/guides/project-structure-authoring.md
      - docs/current/guides/pdm-authoring.md
      - docs/current/guides/qsm-authoring.md
      Verify commands:
      - rg -n "relationRoles|target\\.engine.*native|operations\\.json|handlers/|nativeTasks" docs/current/guides
      - rg -n "deploy|Dokploy|target set-config|project deploy" docs/current/guides/blueprint-authoring.md docs/current/guides/project-structure-authoring.md
      Stop if:
      - The slice needs edits outside allowed files.
      - Owner docs contradict the approved design spec.
      - The guide would need module-authoring, deploy, or native-handler recommendations to remain coherent.
      Board edits required:
      - None; existing T003 already matches this decision.

