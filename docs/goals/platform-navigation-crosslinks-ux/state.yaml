      - "Do not implement."
      - "Require evidence before expanding scope outside apps/platform."
      - "Pick a useful vertical slice, not one tiny helper or one link unless that is truly blocking."
      - "Include a documentation-touch decision."
    expected_output:
      - "Decision: approved implementation package, blocked, or needs more Scout evidence."
      - "Exact Worker objective."
      - "allowed_files for T003."
      - "verify commands for T003, including local automated checks and browser smoke where feasible."
      - "stop_if conditions for T003."
      - "Docs-touch decision and any follow-up task suggestions."
