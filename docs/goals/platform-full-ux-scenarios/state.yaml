# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Platform Full UX Scenarios"
  slug: "platform-full-ux-scenarios"
  kind: existing_plan
  tranche: "continuous execution: integrate supplied platform UX scenarios/components, verify without Docker dependency, and prove the live platform operator outcome"
  status: active
  intake:
    original_request: "Turn MVP apps/platform into a full platform using UX scenarios from .tmp/rntme-ux-design.agent.final.md and prepared components from .tmp/rntme platform; verify on platform.rntme.com."
    interpreted_outcome: "The live platform renders a complete user scenario experience with deployed projects and inspectable artifacts, backed by verified code changes in apps/platform/ui-module and apps/platform."
    input_shape: existing_plan
    audience: "platform users/operators and the operator validating platform.rntme.com"
    authority: requested
    proof_type: demo
    completion_proof: "platform.rntme.com shows the integrated UX, deployed projects are visible, all required artifact views are inspectable, relevant package verification passes, and the final audit maps each scenario from the UX design to live/test evidence."
    likely_misfire: "Static or disconnected UI components are integrated, but runtime data, project/deployment visibility, or artifact inspection still fails on the live platform."
    blind_spots_considered:
      - "Local product testing is hard because Docker is unavailable."
      - "Live deployment or credentialed checks may require secrets or production-like access that must not be printed or persisted."
      - "The supplied .tmp materials may not match current platform architecture and must be validated against docs/code/tests."
      - "Showing deployed projects and artifacts may require data-path fixes beyond UI composition."
      - "Previous GoalBuddy goals are verification references, not current product truth."
    existing_plan_facts:
      - "UX scenarios: .tmp/rntme-ux-design.agent.final.md."
      - "Prepared elements/components: .tmp/rntme platform."
      - "Primary integration targets: apps/platform/ui-module and apps/platform."
      - "Operator acceptance: visit platform.rntme.com, see deployed projects, inspect all artifacts on the platform."
      - "Verification reference: docs/goals/cv-extract-platform-client-auth0-bootstrap-e2e used package-level tests, build/typecheck/lint, live API/UI probes, bundle/deploy evidence, and operator/browser confirmation instead of Docker-only local proof."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  # Dedicated GoalBuddy role-agent configs are not installed, but bundled
  # goal_scout/goal_worker/goal_judge templates exist with the installed skill.
  # /goal can proceed through PM fallback when dedicated agents are unavailable.
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  selected: none
  local:
    status: not_requested
    url: null
    command: "npx goalbuddy board docs/goals/platform-full-ux-scenarios"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: T007

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: high
    objective: "Map the supplied UX scenarios/components, current platform app/ui-module architecture, and no-Docker verification strategy before any implementation."
    inputs:
      - "AGENTS.md"
      - "docs/decision-system.md"
      - "apps/platform/README.md"
      - "apps/platform/ui-module/README.md"
      - "Current owner docs linked from the platform README stubs"
      - ".tmp/rntme-ux-design.agent.final.md"
      - ".tmp/rntme platform"
      - "apps/platform"
      - "apps/platform/ui-module"
      - "docs/goals/cv-extract-platform-client-auth0-bootstrap-e2e/goal.md"
      - "docs/goals/cv-extract-platform-client-auth0-bootstrap-e2e/state.yaml"
      - "Relevant package.json scripts and tests for platform/ui-module"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Do not run Docker-dependent commands as required proof."
      - "Do not print or persist secret values."
      - "Prefer concrete file-path evidence over generic UI advice."
      - "Treat .tmp materials as inputs to validate, not as automatically correct current-state truth."
    expected_output:
      - "Scenario inventory from the UX design, with required screens/workflows/artifact views."
      - "Prepared component/material inventory and how it maps to apps/platform/ui-module and apps/platform."
      - "Current platform gap map with file-path evidence."
      - "Data/API/state dependencies needed to show deployed projects and artifacts."
      - "No-Docker verification plan following the previous cv-extract goal pattern."
      - "Ranked candidate Worker slices with suggested allowed_files, verify commands, and stop_if conditions."
      - "Documentation-touch evaluation: docs that likely need updating, or a reason none do."
    receipt:
      result: done
      summary: >-
        Mapped 16 UX job stories (5 flows + 22 design tasks) against the
        platform-as-blueprint UI. Prepared .tmp materials are 4 static mockups
        with hardcoded data — inputs to validate, not code. Platform has 10
        routes + ~14 Platform* components covering dashboard primitives;
        explorers (data-model/API/UI/graph) have no routes, components, or
        server data. Core gap is data: no server binding emits artifact counts
        or artifact bodies; project.spec.json services panel is still a
        hardcoded placeholder. Top slice: wire project-detail services to a
        real statePath binding — small, non-cosmetic, Docker-free verifiable.
      evidence:
        - ".tmp/rntme-ux-design.agent.final.md (16 job stories, P0=CC-01/D-01..D-04/CC-02)"
        - ".tmp/rntme platform/ — 4 hardcoded static mockups"
        - "apps/platform/blueprint/services/app/ui/manifest.json:11-24 — 10 routes, none for explorers"
        - "apps/platform/ui-module/src/components.tsx — Platform* components; rowsFromState:30-51"
        - "apps/platform/blueprint/services/app/ui/screens/project.spec.json:45-98 — PlatformServicesPanel hardcoded literal, no statePath/data binding"
        - "apps/platform/blueprint/services/projects/graphs/ — only listProjects/listProjectVersions; no artifact graphs"
        - "docs/current/owners/apps/platform.md:57-68 API table"
        - "cv-extract state.yaml — Docker-free verify pattern + T019 operator-confirmation"
      ambiguity_requiring_judge:
        - "Graph Visualization recommends React Flow — new library bet under decision-system F8."
        - "Artifact-body inspection: serve bundle JSON from ProjectVersion storage vs new QSM projection."
        - "Real-time deploy status (CC-02) has no transport in ui-runtime — streaming decision needed."
      spawned_tasks: []

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Convert the Scout map into a phased implementation plan and select the first safe Worker slice."
    inputs:
      - "T001 receipt or note"
      - "Goal charter"
      - "Current state.yaml"
    constraints:
      - "Read-only."
      - "Do not implement."
      - "Keep the first Worker slice small enough to verify without Docker."
      - "Do not choose a purely visual slice if project/artifact runtime data would remain disconnected from the operator outcome."
    expected_output:
      - "Decision"
      - "Ordered implementation slices"
      - "Exact first Worker objective"
      - "allowed_files for the first Worker"
      - "verify commands/checks for the first Worker"
      - "stop_if conditions"
      - "Docs touch decision"
      - "Live verification strategy and what requires credentials or operator confirmation"
    receipt:
      result: done
      decision: approve_next
      rationale: >-
        Verified Scout claims in code: PlatformServicesPanel already supports
        statePath, but project.spec.json uses a hardcoded services literal and
        no server projection emits service rows. A spec-only statePath change
        would render empty (cosmetic, charter-barred), so T003 merges Scout
        slices 1+3 minimally: add a projects.listProjectServices
        projection/graph/binding plus rewire project screen+spec. Artifact
        counts (T005), explorers, and the React Flow bet are deferred.
      plan:
        - "T003: listProjectServices projection+graph+binding + rewire project screen/spec to /data/services statePath."
        - "T005: enrich service rows with artifact counts + wire PlatformSummaryGrid from live data; gated on artifact-body-access ruling."
        - "T006: live platform.rntme.com readiness/deploy proof after T003+T005 locally green."
        - "post-T006: explorer screens (data-model/API/UI/graph) + PlatformSplitPane/PlatformTree; graph explorer carries React Flow F8 decision."
        - "CC-01 status tokens folded into the slice that first needs them (likely T005)."
      architecture_flags:
        - "React Flow (F8): deferred — only the graph-explorer slice; needs its own decision-system pass."
        - "Artifact-body access: T003 avoids it (no counts); full ruling required before T005, lean = publish-time QSM projection."
        - "Real-time deploy transport (CC-02): deferred — refetchOn polling is acceptable interim."
      docs_touch: >-
        T003 needs no root-doc edit (internal blueprint artifacts). owner doc
        docs/current/owners/apps/platform.md API table gains an endpoint —
        route through T007 PM task, not the Worker.
      next_allowed_task: T003
      blocked_tasks: []

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: >-
      Add a runtime-native projects.listProjectServices operation + binding
      (GET /{projectId}/services) whose handler parses the latest published
      bundle blob stored in project_version_bundles and returns deployed
      service rows (name, status, description), then rewire
      project.screen.json/project.spec.json so PlatformServicesPanel renders
      from a /data/services statePath instead of the hardcoded services
      literal.
    note: >-
      T003 first attempt blocked (stop_if: no queryable service source).
      T010 ruling resolved it — direction (b), query-time native handler
      parsing the stored project_version_bundles blob; zero packages/** change.
      Re-scoped below.
    allowed_files:
      - "apps/platform/blueprint/services/projects/operations.json"
      - "apps/platform/blueprint/services/projects/bindings/bindings.json"
      - "apps/platform/blueprint/services/projects/handlers/list-project-services.ts"
      - "apps/platform/blueprint/services/projects/handlers/types.ts"
      - "apps/platform/blueprint/services/projects/graphs/shapes.json"
      - "apps/platform/blueprint/services/app/ui/screens/project.screen.json"
      - "apps/platform/blueprint/services/app/ui/screens/project.spec.json"
      - "apps/platform/blueprint/test/platform-projects-handler.test.ts"
      - "apps/platform/blueprint/test/platform-ui.test.ts"
      - "apps/platform/blueprint/test/platform-blueprint.test.ts"
    verify:
      - "cd /home/coder/project && bun run --filter @rntme/platform-blueprint test"
      - "cd /home/coder/project && bun run --filter @rntme/platform-blueprint typecheck"
      - "cd /home/coder/project && bun run --filter @rntme/platform-ui test"
      - "cd /home/coder/project && bun run depcruise"
      - "Manual: project.spec.json servicesPanel has statePath /data/services and no services literal array; project.screen.json has a /data/services binding to projects.listProjectServices"
    stop_if:
      - "Needs any file outside allowed_files (especially packages/**, apps/platform/blueprint/pdm/**, or platform-core)."
      - "project_version_bundles is not populated/readable from qsmDb in the runtime-native path, or project.json.services is absent or not a string array."
      - "The bindings/operations runtime cannot dispatch a native read operation taking only projectId + auth headers."
      - "Shape system forces per-service artifact counts (entities/schemas/graphs/endpoints) to be required — counts belong to T005."
      - "A new PDM entity or migration proves unavoidable to return service rows."
      - "Verification fails twice with the same root cause."
      - "Slice requires a live deploy or credentials."
    receipt:
      result: done
      changed_files:
        - "apps/platform/blueprint/services/projects/handlers/list-project-services.ts"
        - "apps/platform/blueprint/services/projects/handlers/types.ts"
        - "apps/platform/blueprint/services/projects/operations.json"
        - "apps/platform/blueprint/services/projects/bindings/bindings.json"
        - "apps/platform/blueprint/services/app/ui/screens/project.screen.json"
        - "apps/platform/blueprint/services/app/ui/screens/project.spec.json"
        - "apps/platform/blueprint/test/platform-projects-handler.test.ts"
        - "apps/platform/blueprint/test/platform-blueprint.test.ts"
        - "apps/platform/blueprint/test/platform-ui.test.ts"
      commands:
        - cmd: "bun run --filter @rntme/platform-blueprint test"
          status: pass
          detail: "53 pass, 0 fail"
        - cmd: "bun run --filter @rntme/platform-blueprint typecheck"
          status: pass
          detail: >-
            No new failures. The only error is the pre-existing unrelated
            platform-deployments-handler.test.ts:1206 (ProvisionerInput cast,
            not in allowed_files) — independently confirmed on clean HEAD by
            T004; all T003 files typecheck clean.
        - cmd: "bun run --filter @rntme/platform-ui test"
          status: pass
          detail: "10 pass, 0 fail"
        - cmd: "bun run depcruise"
          status: pass
          detail: "no violations, 827 modules"
      summary: >-
        Added runtime-native projects.listProjectServices: a handler that
        resolves a project id-or-slug from qsmDb, finds the latest
        project_versions row, loads bundle_bytes from project_version_bundles,
        parses with parseCanonicalBundle, and emits {name,status:'Ready'} rows
        from project.json.services (empty list when no published version).
        Registered the native operation + GET /{projectId}/services binding
        mirroring listProjects. Rewired project.screen.json with a
        /data/services binding and project.spec.json's PlatformServicesPanel
        to statePath /data/services, removing the hardcoded literal. Added
        handler tests, operation+binding registration test, and a
        /data/services UI binding-resolution assertion.
      residual_followups:
        - "Pre-existing unrelated typecheck failure in platform-deployments-handler.test.ts:1206 — flag for the deployments-handler owner; not caused by T003. T004 should independently confirm it is pre-existing."
      needs_judge: false

  - id: T010
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: >-
      Rule on how the platform exposes published-bundle contents (deployed
      services and artifact bodies/counts) to the UI runtime, then re-scope
      T003 (and inform T005 + explorer slices) with a concrete, bounded,
      Docker-free-verifiable first Worker slice.
    inputs:
      - "T001 Scout map, T002 Judge plan, T003 blocked receipt"
      - "Goal charter (scope: apps/platform + apps/platform/ui-module unless evidence forces a platform/runtime/package change)"
      - "docs/decision-system.md (for any architecture bet)"
      - "apps/platform/blueprint/services/projects/** (qsm, graphs, bindings, operations, handlers, pdm)"
      - "apps/platform/blueprint/services/projects/handlers/** and the publishProjectVersion path"
      - "How ui-runtime data bindings + graphs resolve (existing listProjectVersions end-to-end)"
    constraints:
      - "Read-only. Do not implement."
      - "The chosen first slice must be verifiable without Docker."
      - "Stay within apps/platform unless the evidence proves a packages/** change is unavoidable; if so, name the exact files and justify."
      - "Decide explicitly between: (a) new ProjectService/artifact PDM entity populated by the publish handler, (b) a graph/handler that introspects the stored bundle blob at query time, (c) a publish-time QSM projection derived from the bundle, or (d) another path — with rationale tied to the charter and decision-system."
      - "The ruling must also cover artifact bodies/counts (T005 + explorers depend on the same source), not only service rows."
    expected_output:
      - "Decision: the data-source architecture for published-bundle services + artifacts."
      - "Re-scoped T003 objective, allowed_files, verify, stop_if (bounded, Docker-free)."
      - "Whether the slice needs any packages/** change and exact justification if so."
      - "Impact on T005 and explorer slices."
      - "Docs-touch decision (decision-system.md entry if a new bet; owner doc updates)."
    receipt:
      result: done
      decision: approve_next
      rationale: >-
        Verified in code: no Service PDM entity, but publishProjectBundleHandler
        already parses the bundle and persists raw bytes in
        project_version_bundles, and native handlers already read qsmDb
        directly. Chose direction (b): a query-time native listProjectServices
        handler parsing the stored bundle blob — zero packages/** or PDM
        change, and the same handler family scales to T005 artifact counts and
        explorer artifact bodies. Rejected (a) new PDM entity (heavy
        migration + dual publish-path writes, charter-barred scope) and (c)
        publish-time projection (no precedent for computed projections here).
      end_to_end: >-
        Publish path already stores raw bundle bytes in project_version_bundles
        keyed by version_id. New native operation listProjectServices +
        binding GET /{projectId}/services; handler resolves project, finds
        latest project_versions row, loads bundle_bytes, parseCanonicalBundle,
        reads project.json services array, emits {name,status,description}
        rows. project.screen.json gains /data/services binding;
        project.spec.json servicesPanel drops the literal and gains
        statePath /data/services. PlatformServicesPanel already renders from
        statePath — no ui-module code change.
      packages_impact: >-
        None. Whole slice fits in apps/platform/blueprint. parseCanonicalBundle
        already exported by @rntme/platform-core and already a handler dep;
        project_version_bundles table and qsmDb native-handler pattern already
        exist.
      impact_t005_explorers: >-
        T005 + explorer slices consume the same source (stored bundle blob).
        T005's artifact-body-access prerequisite is now satisfied: parse the
        stored bundle blob at query time via a native handler. React Flow (F8)
        remains separately deferred to the graph-explorer slice.
      docs_touch: >-
        decision-system.md gains a lightweight bet entry (UI reads
        published-bundle contents via query-time blob parsing, not new PDM
        entities/projections); owner doc apps/platform.md Native-operations
        table gains GET /api/projects/{projectId}/services. Both routed
        through T007 PM docs task, not the Worker.
      next_allowed_task: T003
      blocked_tasks: []

  - id: T004
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Audit the first implementation slice and choose the next required slice toward full platform UX completion."
