# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Platform Navigation and Cross-Link UX Repair"
  slug: "platform-navigation-crosslinks-ux"
  kind: open_ended # specific | open_ended | existing_plan | recovery | audit
  tranche: "Audit, repair, locally verify, redeploy, and production-smoke apps/platform navigation and cross-links until the full user-facing UX outcome is proven."
  status: done # active | blocked | done
  completed_at: "2026-05-15"
  completion_note: "T999 audit (above) concluded complete with full_outcome_complete: true. Slice A+B+D shipped to https://platform.rntme.com; live bundle confirmed to carry every UX change; HTTP smoke green; residuals T006/T008/T009 are gated/optional per T002 Judge decision and do not block the original outcome."
  intake:
    original_request: "Prepare a GoalBuddy goal to put apps/platform navigation, cross-links, etc. in order; navigation generally does not work now, and UI/UX logic is in .tmp/rntme-ux-design.agent.final.md."
    interpreted_outcome: "apps/platform has coherent working navigation and cross-link flows aligned with the UX design document, verified locally and after production redeploy."
    input_shape: specific # vague | specific | existing_plan | recovery | audit
    audience: "platform users and operators"
    authority: approved # requested | approved | inferred | needs_approval | blocked
    proof_type: demo # test | demo | artifact | metric | review | source_backed_answer | decision
    completion_proof: "Automated/local verification and browser smoke pass, production redeploy runs when commands and credentials are available, and production smoke confirms key navigation/cross-link flows work against the deployed platform app."
    likely_misfire: "Fixing only obvious broken links or route errors while missing the UX flow model, shared UI/runtime causes, docs-touch requirements, or the required redeploy and production check."
    blind_spots_considered:
      - "The UX design document may not map one-to-one to current route names or component boundaries."
      - "Navigation behavior may be partly owned by shared UI/runtime packages rather than only apps/platform."
      - "Production deploy commands, credentials, URLs, or smoke credentials may be unavailable or ambiguous."
      - "Autotests may pass while the browser user flow still fails."
    existing_plan_facts:
      - "Use .tmp/rntme-ux-design.agent.final.md as the UI/UX authority."
      - "Scope is apps/platform plus shared UI/runtime packages only when evidence shows they are required."
      - "No visual board was requested."
      - "Create a fresh goal."
      - "Production redeploy is approved to run automatically if commands and credentials are available."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  # installed | bundled_not_installed | missing | unknown
  # If non-installed, /goal can continue through PM fallback; install agents before /goal only when dedicated delegation is required.
  scout: installed
  worker: installed
  judge: installed

visual_board:
  # none | local | github_projects | both | unknown
  selected: none
  local:
    status: not_requested # not_requested | starting | live | generated | blocked
    url: null
    command: "npx goalbuddy board docs/goals/platform-navigation-crosslinks-ux"
  github_projects:
    status: not_requested # not_requested | needs_approval | dry_run_ready | synced | blocked
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null # All blocking tasks done; T006/T008/T009 are gated/optional residuals per T002 Judge decision

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: high # default | low | medium | high | xhigh
    objective: "Map the expected UX navigation model, current apps/platform route/link behavior, related shared UI/runtime dependencies, and production redeploy/smoke path."
    inputs:
      - "AGENTS.md"
      - "docs/decision-system.md"
      - "apps/platform/README.md and its current owner doc"
      - ".tmp/rntme-ux-design.agent.final.md"
      - "apps/platform source, tests, package scripts, and routing/navigation files"
      - "Shared UI/runtime packages only when evidence shows they affect platform navigation"
      - "Deploy docs, scripts, CI config, and environment hints needed to identify redeploy and production smoke commands"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Follow AGENTS.md read order before package source inspection."
      - "Verify current behavior in code and tests; specs and plans are rationale, not current-state truth."
      - "Record evidence with file paths and commands, not generic advice."
      - "Do not assume production deploy commands, URLs, or credentials; identify them from repo/tooling evidence or mark missing."
    expected_output:
      - "Expected navigation/cross-link model from the UX design document."
      - "Current route/link map and the main broken or missing flows."
      - "Evidence for any required shared UI/runtime scope expansion."
      - "Relevant local verification commands and any existing navigation tests."
      - "Production redeploy command/path, production URL or smoke target, and missing credential/env requirements if any."
      - "Ranked repair candidates, with suggested largest safe implementation slice."
      - "Documentation-touch evaluation surface."
    receipt:
      result: done
      summary: "Root cause: PlatformSidebar in main.spec.json hard-codes every item to href='/' (login); breadcrumbs static; data-model/api/ui/graph have no back-link; deployments/audit/deploy-targets rows lack hrefTemplate. Only project header actions work. Deploy via `rntme platform up --target platform.target.json` (PLATFORM_SECRET_ENCRYPTION_KEY from Dokploy compose); URL https://platform.rntme.com. Recommended largest safe slice for Judge: Slice A (route-aware sidebar + topbar) + Slice B (cross-link fill-ins) as one Worker package; Slice C (ui-runtime click delegation) gated separately; Slice D polish later."
      note: "docs/goals/platform-navigation-crosslinks-ux/notes/T001-platform-nav-scout.md"
      evidence:
        - "apps/platform/blueprint/services/app/ui/manifest.json"
        - "apps/platform/blueprint/services/app/ui/layouts/main.spec.json:18-26,36-43"
        - "apps/platform/blueprint/services/app/ui/screens/project.spec.json:19-40"
        - "apps/platform/blueprint/services/app/ui/screens/{data-model,api,ui,graph,deployments,audit,deploy-targets,no-org}.spec.json"
        - "apps/platform/ui-module/src/components.tsx:1986-2074 (PlatformSidebar), :424-490 (PlatformPageHeader)"
        - "packages/runtime/ui-runtime/src/client/entry.tsx:209-321"
        - "apps/platform/blueprint/test/platform-ui.test.ts:17-146"
        - "apps/platform/ui-module/test/components.test.tsx:243-283"
        - ".tmp/rntme-ux-design.agent.final.md"
        - "platform.target.json"
        - "apps/cli/README.md"
      spawned_tasks: []

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Review Scout evidence and choose the largest safe local implementation package for navigation/cross-link repair."
    inputs:
      - "T001 receipt or note"
      - "docs/goals/platform-navigation-crosslinks-ux/goal.md"
      - "docs/goals/platform-navigation-crosslinks-ux/state.yaml"
    constraints:
