tasks:
  # =========================================================================
  # Phase A — Audit (Scout, read-only). Produces notes/audit-catalog.md.
  # =========================================================================
  - id: T001
    type: scout
    assignee: Scout
    status: done
    objective: >-
      Initialize notes/audit-catalog.md with the schema below and produce a
      one-page workspace map: every workspace package (apps/, packages/**, and
      non-vendored demo sources), its purpose, owner doc, and a one-line
      health signal (last touched commit, presence of tests, presence of
      docs/current/owners doc).
    inputs:
      - "Bun workspace root, package.json, AGENTS.md"
      - "docs/current/owners/** index"
    constraints:
      - "Read-only. No edits to source files."
      - "Do NOT descend into demo/*/node_modules — vendored, off-limits."
    expected_output:
      - "notes/audit-catalog.md created with sections: 0_workspace_map, 1_findings (empty), 2_ranking (empty), 3_worker_queue (empty), 4_backlog (empty)."
      - "Catalog finding schema documented at top of file: id (F###), package(s), kind (architectural|duplication|suboptimal|complexity|dead_strut|risk), severity (P0|P1|P2|P3), impact (high|med|low), confidence (high|med|low), reversibility (high|med|low), est_effort_h, evidence_paths[], summary, proposed_fix."
    receipt:
      result: done
      summary: >-
        Mapped 60 workspace entries (58 packages with package.json + 2 demo blueprint
        source trees); scaffold + four empty placeholder sections in place.
      evidence:
        - docs/goals/simplify-monorepo-audit/notes/audit-catalog.md
      workspace_package_count: 60
      anomalies:
        - "Missing owner docs: packages/artifacts/_shared, modules/marketing-site/conformance, modules/marketing-site/static-html, modules/storage/conformance, packages/contracts/storage/v1."
        - "apps/platform/ui-module shares owner doc with apps/platform."
        - "demo/notes-blueprint and demo/order-fulfillment-blueprint have no package.json — listed as blueprint source trees; Judge to decide scope in T100."
        - "Two recent broad commits dominate last-touched: 4f7b6753 (2026-05-10) and 15c9d005 (2026-05-14) — Phase B should note their scope."

  - id: T002
    type: scout
    assignee: Scout
    status: done
    objective: >-
      Audit Wave 1 — packages/runtime/**: bindings-grpc, bindings-http,
      bpmn-worker, event-store, projection-consumer, runtime, sqlite,
      ui-runtime. Find architectural problems, multiple implementations,
      dead struts, suboptimal patterns. Append findings to
      notes/audit-catalog.md.
    inputs:
      - "packages/runtime/**"
      - "docs/current/owners/runtime/**"
    constraints:
      - "Read-only."
      - "Cross-reference earlier waves' findings before adding a new one — duplicates collapse, not multiply."
    expected_output:
      - "New F### entries in notes/audit-catalog.md section 1_findings."
      - "Receipt lists count of new findings + any cross-cutting suspicions to flag for later waves."
    receipt:
      result: done
      summary: >-
        10 findings (F001–F010) appended: 3 architectural (OperationExecutor + generic
        HTTP middleware live in bindings-http; GrpcSurface is no-op), 4 duplications
        (gRPC ids/Struct codec across grpc+bpmn-worker; type-string parser across
        runtime+blueprint; in-memory Kafka adapter; env parser), 1 suboptimal
        (RuntimeConfig hand-rolled validators vs zod), 1 dead-strut (DbDriver), 1
        duplication (bpmn-worker dual dispatch loops).
      evidence: [docs/goals/simplify-monorepo-audit/notes/audit-catalog.md]
      new_finding_ids: [F001, F002, F003, F004, F005, F006, F007, F008, F009, F010]
      cross_wave_suspicions:
        - target_packages: ["@rntme/blueprint", "@rntme/bindings"]
          hint: "F006: blueprint's binding-resolvers + runtime's load-service both regex-parse `scalar | list<T> | row<Shape>` type strings. Canonical parser belongs in @rntme/bindings or an artifact-shared lib."
        - target_packages: ["@rntme/graph-ir-compiler"]
          hint: "F001: OperationExecutor wraps graph-ir-compiler's CompiledOperation/OperationResult — check whether graph-ir-compiler should own it instead of bindings-http."
        - target_packages: ["@rntme/platform-core", "@rntme/deploy-core"]
          hint: "F008 (DbDriver dead-strut): confirm platform-core/deploy-core never instantiate a non-Bun DbDriver before removing the abstraction."
      notes: >-
        Biggest signal — bindings-http is not really the HTTP package: it owns OperationExecutor + generic Hono middleware, so bindings-grpc and HttpSurface depend on it for non-HTTP reasons. F001+F002+F005 together suggest a re-cut: extract runtime-contracts + runtime-http-middleware. Three independent gRPC client surfaces all hand-roll protobufjs method/Struct codec; expect more duplication in Wave 4.

  - id: T003
    type: scout
    assignee: Scout
    status: done
    objective: >-
      Audit Wave 2 — packages/artifacts/**: bindings, blueprint,
      graph-ir-compiler, init, pdm, qsm, seed, _shared, ui, workflows.
    inputs:
      - "packages/artifacts/**"
      - "docs/current/owners/artifacts/**"
    constraints:
      - "Read-only."
      - "Pay attention to: graph-ir-compiler vs blueprint compilation overlap; pdm/qsm/seed overlapping responsibilities."
    expected_output:
      - "New F### entries in notes/audit-catalog.md."
      - "Cross-wave duplication candidates flagged in receipt."
    receipt:
      result: done
      summary: >-
        9 findings (F011–F019). Themes: layering violations (artifacts→runtime,
        blueprint→platform-core), blueprint vs graph-ir-compiler authoring-parse
        duplication, seed vs graph-ir state-machine/payload duplication,
        parse-template boilerplate, pdm/qsm load-dir error-code asymmetry.
        F006/F001 cross-wave hypotheses both confirmed from the artifacts side.
      evidence: [docs/goals/simplify-monorepo-audit/notes/audit-catalog.md]
      new_finding_ids: [F011, F012, F013, F014, F015, F016, F017, F018, F019]
      cross_wave_suspicions:
        - target_packages: ["@rntme/bindings-http", "@rntme/bindings-grpc"]
          hint: "F014: OperationExecutor seam should move into graph-ir-compiler (resolves F001 from the artifact side). Worker picks one home — coordinate with F001."
        - target_packages: ["@rntme/event-store", "@rntme/sqlite", "@rntme/contracts/*"]
          hint: "F012: depcruise rule `artifacts-must-not-import-runtime` is silently violated by graph-ir-compiler and seed. Worker must run `bun run depcruise` to confirm enforcement, and consider moving event-store TYPES to a contracts package."
        - target_packages: ["@rntme/platform-core"]
          hint: "F016: CanonicalBundle ownership is inverted. Wave 3 should map producer vs consumer."
        - target_packages: ["@rntme/cli", "@rntme/runtime"]
          hint: "F013: confirm runtime/load/load-service.ts and cli loaders share blueprint's hand-rolled graph parsing; if so, adopting parseAuthoringSpec is a single fix that lands everywhere."
      notes: >-
        Surprises: graph-ir-compiler imports SqliteDatabase + EventStore from runtime
        despite explicit depcruise prohibition (rule may not be enforced — Worker to verify);
        `command-runtime/` subdir inside an artifact package smells runtime-shaped;
        `_shared` is well-designed but pdm vs qsm loaders produce divergent error fidelity (F019);
        `derivePayload` and `wrapPayloads` both build {before,after} envelopes → single owner in
        canonical-event-shape package is natural.

  - id: T004
    type: scout
    assignee: Scout
    status: done
    objective: >-
      Audit Wave 3 — packages/contracts/**: ai-llm, analytics, client-runtime,
      _common, crm, handlers, identity, marketing-site, module, provisioner,
      storage.
    inputs:
      - "packages/contracts/**"
      - "docs/current/owners/contracts/**"
    constraints:
      - "Read-only."
      - "Look for: contract schemas that duplicate runtime types; abandoned contract modules; inconsistent naming conventions."
    expected_output:
      - "New F### entries in notes/audit-catalog.md."
    receipt:
      result: done
      summary: >-
        9 findings (F020–F028). client-runtime contract carries runtime logic
        + React (P1); Result duplicated in 3 packages (P1); divergent zod majors;
        3-way drift in error-codes; 5× near-identical proto gen scripts; abandoned
        analytics contract; phantom bindings-http devDep in handlers; parse/validate
        logic inside module+marketing-site contracts. No OperationExecutor /
        ServiceDefinition / CanonicalBundle / EventEnvelope contract exists yet —
        F001/F004/F012/F016 candidate homes all open.
      evidence: [docs/goals/simplify-monorepo-audit/notes/audit-catalog.md]
      new_finding_ids: [F020, F021, F022, F023, F024, F025, F026, F027, F028]
      cross_wave_suspicions:
        - target_packages: ["@rntme/bindings-http", "@rntme/contracts-handlers-v1", "@rntme/graph-ir-compiler"]
          hint: "F001/F014 home: no OperationExecutor contract exists; handlers/v1 has a phantom bindings-http devDep (F026) likely from a planned move that never landed."
        - target_packages: ["@rntme/contracts-provisioner-v1", "@rntme/artifact-shared", "@rntme/deploy-core"]
          hint: "F021: Result duplicated in 3 packages with one comment apologizing. Promote to contracts/_common/v1 or a tiny @rntme/result package."
        - target_packages: ["@rntme/platform-core", "@rntme/blueprint"]
          hint: "F016: no contract currently holds the deployable-bundle shape. Adding it to contracts/module/v1 or contracts/blueprint-bundle/v1 would fit."
        - target_packages: ["@rntme/contracts-client-runtime-v1", "@rntme/ui-runtime", "modules/**"]
          hint: "F020: vendor modules import factories+hooks from client-runtime; Wave 4/5 must trace each call site when the contract is split."
        - target_packages: ["packages/contracts/*/scripts/gen.mjs"]
          hint: "F024: 5 proto-gen scripts diff by ≤3 lines. Single scripts/build-proto.mjs at contracts/_shared."
      notes: >-
        Confirms F001/F004/F012/F016 candidate contract homes are all unoccupied.
        Phantom bindings-http devDep on contracts-handlers-v1 (F026) suggests an
        abandoned earlier attempt to host OperationExecutor there.

  - id: T005
    type: scout
    assignee: Scout
    status: done
    objective: >-
      Audit Wave 4 — packages/platform/** (deploy-bundle-input, platform-core,
      platform-storage) and packages/deploy/** (deploy-core, deploy-dokploy,
      deploy-runner).
    inputs:
      - "packages/platform/**"
      - "packages/deploy/**"
      - "docs/current/owners/platform/**"
      - "docs/current/owners/deploy/**"
    constraints:
      - "Read-only."
      - "Highlight: provisioner-resolver gap (see rntme_provisioner_resolver_gap), orphan-detect-queued gap, platform-redeploy secret handling."
    expected_output:
      - "New F### entries in notes/audit-catalog.md."
    receipt:
      result: done
      summary: >-
        10 findings (F029–F038). Confirms F008/F016/F021. Highlights:
        DeployAdapter seam dead (0 consumers), AES-GCM crypto re-implemented in
        deployments handlers, 8/12 repos use raw SQL despite Drizzle schema,
        deploy-runner ships 190 LoC of "import-free" mirror types but already
        deps platform-core/storage, hard-coded platform persistence, stringly-
        built compose/nginx output, queued-orphan bug confirmed
        (rntme_orphan_detect_queued_gap memory valid).
        STALE memory: `rntme_provisioner_resolver_gap` — resolveProvisioner
        now imports from bundle assets (already fixed); memory should be retired.
      evidence: [docs/goals/simplify-monorepo-audit/notes/audit-catalog.md]
      new_finding_ids: [F029, F030, F031, F032, F033, F034, F035, F036, F037, F038]
      confirmed_earlier_findings: [F008, F016, F021]
      cross_wave_suspicions:
        - target_packages: ["@rntme/bindings-grpc", "@rntme/deploy-bundle-input"]
          hint: "emitProto is the only thing deploy-bundle-input needs from bindings-grpc. Tiny @rntme/proto-emitter would erase runtime→deploy edge — pairs with F001/F014 seam relocation."
        - target_packages: ["@rntme/contracts-module-v1", "@rntme/deploy-bundle-input"]
          hint: "Vendor-category→proto mapping hard-coded in runtime-module-wiring; contracts-module-v1 already has module.category — natural lookup key."
        - target_packages: ["@rntme/blueprint", "@rntme/deploy-core", "@rntme/platform-core"]
          hint: "F016+F038 together: persistence schema needs blueprint+platform-core agreement; that's the right moment to also relocate CanonicalBundle."
        - target_packages: ["packages/runtime/ui-runtime", "@rntme/deploy-bundle-input"]
          hint: "readUiRuntimeCss path-walks ui-runtime/build/main.css. Make ui-runtime publish CSS via package.json#exports."
      stale_memory_entries:
        - rntme_provisioner_resolver_gap

  - id: T006
    type: scout
    assignee: Scout
    status: done
    objective: >-
      Audit Wave 5 — apps/**: cli, landing, platform (blueprint + ui-module +
      submodules), EXCLUDING any vendored node_modules under demo/ or apps/.
    inputs:
      - "apps/**"
      - "docs/current/owners/apps/**"
    constraints:
      - "Read-only."
      - "Skip apps/platform/blueprint/services/*/node_modules and demo/**/node_modules entirely."
      - "Look for: per-screen ad-hoc state, duplicated explorer/editor patterns, spec.json drift vs handler reality."
    expected_output:
      - "New F### entries in notes/audit-catalog.md."
    receipt:
      result: done
      summary: >-
        10 findings (F039–F048). components.tsx is 3746 LoC with 25+ exports
        and 2 explorers reimplementing same pattern; module.json schema omits
        9+ props that screen specs pass (drift); 4 explorer headers duplicated
        across 5 spec files; ~30 bindings × 3-key sessionSubject inputFrom
        repeats; CLI and platform handler bytewise-duplicate
        resolveBundledProvisioner; duplicated watch loops; 3 orphan landing
        components; error-fidelity loss in publish; two-package apps/platform
        layout explains T001 anomaly; one-line back-link bug. Confirms F018,
        F036; partial F029/F038.
      evidence: [docs/goals/simplify-monorepo-audit/notes/audit-catalog.md]
      new_finding_ids: [F039, F040, F041, F042, F043, F044, F045, F046, F047, F048]
      confirmed_earlier_findings: [F018, F036]
      cross_wave_suspicions:
        - target_packages: ["packages/blueprint/blueprint"]
          hint: "compose-time spec.json validation should fail F040-class drift (props not declared in module.json) — check whether a validator exists and is bypassed for platform-ui."
        - target_packages: ["packages/deploy/deploy-runner"]
          hint: "ResolveProvisioner contract implemented twice (F043); single buildResolveProvisioner helper belongs here."
      notes: >-
        apps/platform is two packages, not one — T001 anomaly has a structural
        cause (F047). spec.json health is "honest data bindings, drifty
        component-prop schema". CLI commands are well-factored via harness.ts
        except the two watch loops. Landing has dead components from a reverted
        slice.

  - id: T007
    type: scout
    assignee: Scout
    status: done
    objective: >-
      Audit Wave 6 — packages/tooling/** (bundle-publish, module-scaffold)
      and non-vendored demo sources (demo/cv-extract-blueprint/src,
      demo/notes-blueprint source files NOT under node_modules,
      demo/order-fulfillment-blueprint).
    inputs:
      - "packages/tooling/**"
      - "demo/cv-extract-blueprint/{src,package.json,blueprint.json,*.md}"
      - "demo/notes-blueprint/* — only non-node_modules files"
      - "demo/order-fulfillment-blueprint/**"
    constraints:
      - "Read-only."
      - "Do NOT touch or read demo/notes-blueprint/node_modules/rntme_* (vendored snapshots)."
      - "Compare demo blueprints to detect copy-paste drift."
    expected_output:
      - "New F### entries in notes/audit-catalog.md."
    receipt:
      result: done
      summary: >-
        6 findings (F049–F054). Highlights: notes-demo snake_case naming
        forces a dedicated alias regex in @rntme/blueprint (mechanical
        cleanup); pdmRef/qsmRef/graphSpecRef/bindingsRef are dead fields
        runtime overrides anyway; vendor-check.mjs doesn't schema-validate
        manifests (F029/F040/F045 drift uncaught by CI); 4th Result<T,E>
        impl lives in bundle-publish; module-scaffold has duplicate tests;
        three demos diverge on get-by-id graph topology. Confirms F018/F029/F040/F045.
      evidence: [docs/goals/simplify-monorepo-audit/notes/audit-catalog.md]
      new_finding_ids: [F049, F050, F051, F052, F053, F054]
      confirmed_earlier_findings: [F018, F029, F040, F045]
      cross_wave_suspicions: []
      notes: >-
        cv-extract is the only "full" demo; notes/order-fulfillment have no
        package.json so bun workspaces silently skip them — explains T001 anomaly.
        Adding zod parse to vendor-check.mjs is a near-zero-cost CI gate.

  # =========================================================================
  # Phase B — Aggregation + prioritization (Judge, read-only).
  # =========================================================================
  - id: T100
    type: judge
    assignee: Judge
    status: done
    objective: >-
      Aggregate Phase A findings. Collapse cross-wave duplicates into single
      entries with combined evidence_paths. Re-score each finding for impact,
      confidence, reversibility, est_effort_h. Update notes/audit-catalog.md
      section 2_ranking with the merged ranked list, sorted by
      (impact * confidence) / risk_descending. Cosmetic-only items go to
      section 4_backlog.
    inputs:
      - "notes/audit-catalog.md (all Phase A findings)"
      - "All T002–T007 receipts"
    constraints:
      - "Read-only — only edits to notes/audit-catalog.md allowed."
      - "Apply the goal's likely_misfire test: if a candidate is mostly rename/move with no architectural payoff, push it to backlog."
    expected_output:
      - "Ranked list in 2_ranking with rank #, F###, score breakdown, and est_effort_h."
      - "Receipt summarizes top-10 candidates and total est_effort_h of the top of the ranked list."
    receipt:
      result: done
      summary: >-
        41 merged ranked entries (54 findings, ~24% collapse) + 10 backlog.
        Top-10 effort = 22h; T101 must trim to ≤13h.
      evidence: [docs/goals/simplify-monorepo-audit/notes/audit-catalog.md]
      decision: "Phase A aggregated/ranked; top-N candidates ready for T101 queue build."
      top_10_ids: [F021, F006, F034, F031, F040, F043, F022, F033, F030, F037]
      top_10_total_effort_h: 22
      next_allowed_task: T101
      notes: >-
        Kept F029/F036/F042/F037/F033 separate (distinct fixes, not one cluster).
        F053 split: bundle-publish Result→Rank#1; module-scaffold→backlog.
        F040 must run BEFORE F052 (or vendor-check gate fails on day-1 manifests).
        Six Rank-1 entries at score 9.0 in 12h combined; T101 should evaluate
        disjoint-allowed_files parallelism (F034 platform-storage repos vs F040
        platform-ui module.json vs F022 contracts package.json vs F021 cross-pkg
        Result). F047 + F048 → backlog per likely_misfire (rename/move only).

  - id: T101
    type: judge
    assignee: Judge
    status: done
    objective: >-
      Build the executable Worker queue.
    receipt:
      result: done
      summary: "7 queued slices (Q1..Q7), total est_effort_h = 13 (exact cap), budget started 2026-05-15T18:10:00Z."
      evidence: [docs/goals/simplify-monorepo-audit/notes/audit-catalog.md]
      decision: "Worker queue published; first slice is Q1 (F034 — fix stale-queued orphan sweep in platform-storage)."
      execution_budget_started_at: "2026-05-15T18:10:00Z"
