        - "docs/superpowers/plans/2026-05-13-cv-extract-platform-client-deploy-e2e.md"
        - "docs/superpowers/plans/2026-05-13-platform-multi-provider-edge-auth.md"
        - "docs/decision-system.md"
        - "docs/current/owners/packages/deploy/deploy-runner.md"
      verify:
        - "test ! -d docs/superpowers/plans || test -z \"$(find docs/superpowers/plans -type f -print -quit)\""
        - "rg -n \"docs/superpowers/plans/\" docs/decision-system.md docs/current docs/README.md AGENTS.md README.md CLAUDE.md"
        - "git diff --check -- docs/superpowers/plans docs/decision-system.md docs/current/owners/packages/deploy/deploy-runner.md"
      stop_if:
        - "Need to edit files outside allowed_files."
        - "Any spec under docs/superpowers/specs/** or docs/history/specs/** would be deleted."
        - "A current-doc reference to a deleted plan cannot be removed or replaced without a decision-system change."
        - "Unrelated dirty platform/UI/vendor files would be overwritten."
      deferred:
