name: release

on:
  push:
    tags: ['v*.*.*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run --filter "@rntme/*" build
      - run: bun run --filter "@rntme/*" test

      - name: Derive version
        id: ver
        run: echo "v=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/runtime/runtime/Dockerfile
          push: true
          tags: |
            ghcr.io/vladprrs/rntme-runtime:${{ steps.ver.outputs.v }}
            ghcr.io/vladprrs/rntme-runtime:latest

      - run: |
          printf '//registry.npmjs.org/:_authToken=%s\n' "$NODE_AUTH_TOKEN" > ~/.npmrc
          bun publish --cwd packages/runtime/runtime --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
